<!-- 범용 체크리스트 PWA — 여러 리스트 + 브라우저 내장 DB(IndexedDB) · 오프라인 -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>체크리스트</title>

<!-- PWA: 홈 화면에 추가하면 앱처럼 실행 -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2E6E8E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="체크리스트">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#FBFAF7;
    --ink:#1B2A30;
    --ink-soft:#5A6A6F;
    --line:#E6E1D7;
    --glacier:#2E6E8E;
    --glacier-soft:#E5F0F4;
    --sand:#C2774A;
    --sand-soft:#F6EAE0;
    --gold:#B7892F;
    --done:#3C8C6E;
    --done-soft:#E4F1EA;
    --shadow:0 1px 2px rgba(27,42,48,.05), 0 8px 24px rgba(27,42,48,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Pretendard",system-ui,sans-serif;
    line-height:1.55;letter-spacing:-.01em;
  }
  .wrap{max-width:820px;margin:0 auto;padding:22px 18px 80px}

  /* ---------- list switcher ---------- */
  .topbar{display:flex;gap:8px;align-items:center;margin-bottom:14px}
  .listsel{flex:1;min-width:0;border:1px solid var(--line);background:#fff;border-radius:12px;
    padding:11px 12px;font-family:inherit;font-size:15px;font-weight:700;color:var(--ink);box-shadow:var(--shadow)}
  .listsel:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .iconbtn{flex:none;width:44px;height:44px;border-radius:12px;border:1px solid var(--line);background:#fff;
    color:var(--ink-soft);font-size:20px;cursor:pointer;display:grid;place-items:center;transition:.15s;box-shadow:var(--shadow)}
  .iconbtn:hover{border-color:var(--glacier);color:var(--glacier);background:var(--glacier-soft)}
  .iconbtn:active{transform:scale(.94)}

  /* ---------- header ---------- */
  header{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:18px}
  .climate-strip{height:6px;background:linear-gradient(90deg,var(--glacier) 0%,#7fb0c4 38%,#e7c98f 62%,var(--sand) 100%)}
  .head-body{padding:20px 22px}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--glacier);font-weight:700;margin-bottom:6px}
  h1{font-family:"Pretendard",sans-serif;font-weight:700;font-size:25px;line-height:1.15;margin:0;letter-spacing:-.015em}
  .dday{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:13px;font-weight:700;
    padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--ink);font-variant-numeric:tabular-nums}
  .dday[data-s="soon"]{background:var(--glacier-soft);border-color:#bfe0ec;color:#1d5e78}
  .dday[data-s="go"]{background:var(--done-soft);border-color:#cfe6db;color:#27795c}
  .dday[data-s="done"]{background:var(--sand-soft);border-color:#ecd8c8;color:#9c5a30}

  /* ---------- progress ---------- */
  .progress-card{margin-top:18px;padding:16px;border:1px dashed var(--line);border-radius:14px;background:var(--paper)}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .progress-top .pct{font-family:"Fraunces",serif;font-size:24px;font-weight:600;color:var(--ink)}
  .progress-top .label{font-size:13px;color:var(--ink-soft)}
  .bar{height:10px;border-radius:99px;background:#ECE7DC;margin-top:10px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--glacier),var(--done));transition:width .5s cubic-bezier(.4,0,.2,1)}
  .mini-stats{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
  .mini{font-size:13px;color:var(--ink-soft)}
  .mini b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
  .mini .buy{color:var(--sand)}

  /* ---------- filter bar ---------- */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 10px;position:sticky;top:0;z-index:5;
    background:linear-gradient(var(--paper) 70%,rgba(251,250,247,0));padding:8px 0}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    padding:7px 13px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .chip:hover{border-color:var(--glacier);color:var(--glacier)}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

  /* ---------- sections ---------- */
  .section{margin-top:22px}
  .sec-head{display:flex;align-items:center;gap:10px;margin:0 2px 10px;cursor:pointer;user-select:none}
  .sec-num{font-family:"Fraunces",serif;font-size:13px;color:var(--sand);font-weight:600;min-width:22px}
  .sec-title{font-size:16px;font-weight:700}
  .sec-count{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .sec-rule{flex:1;height:1px;background:var(--line)}
  .sec-chev{color:var(--ink-soft);font-size:12px;transition:transform .2s;margin-left:2px}
  .section.collapsed .sec-chev{transform:rotate(-90deg)}

  ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  li.item{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);
    border-radius:13px;padding:13px 14px;box-shadow:var(--shadow);transition:.18s;cursor:pointer}
  li.item:hover{border-color:#d3ccbe}
  li.item.checked{background:var(--done-soft);border-color:#cfe6db}
  li.item.checked .name{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:#9bc7b4}
  .box{flex:none;width:22px;height:22px;border-radius:7px;border:2px solid #cfc7b7;background:#fff;
    margin-top:1px;display:grid;place-items:center;transition:.18s}
  .box svg{width:13px;height:13px;stroke:#fff;stroke-width:3.4;fill:none;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:20;stroke-dashoffset:20;transition:stroke-dashoffset .25s ease}
  li.item.checked .box{background:var(--done);border-color:var(--done)}
  li.item.checked .box svg{stroke-dashoffset:0}
  .body{flex:1;min-width:0}
  .line1{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .name{font-size:15px;font-weight:600}
  .tag{font-size:10.5px;font-weight:800;letter-spacing:.02em;padding:2px 7px;border-radius:6px;white-space:nowrap}
  .tag.buy{background:var(--sand-soft);color:#9c5a30}
  .tag.have{background:var(--glacier-soft);color:#256079}
  .star{color:var(--gold);font-size:12px;font-weight:800}
  .price{font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap;
    background:#EAF3EE;color:#27795c;cursor:pointer;font-variant-numeric:tabular-nums}
  .price:hover{background:#d7ebe0}
  li.item.checked .price{background:#dcebe3}
  .note{font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.45}
  .note .warn{color:#b4502a;font-weight:600}
  .del{flex:none;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:#fff;
    color:var(--ink-soft);font-size:20px;line-height:1;cursor:pointer;padding:0;display:grid;place-items:center;transition:.15s}
  .del:hover{border-color:var(--sand);color:var(--sand);background:var(--sand-soft)}
  .del:active{transform:scale(.92)}
  .item-actions{display:flex;gap:6px;align-self:center}
  .del.edit{font-size:17px}
  .del.edit:hover{border-color:var(--glacier);color:var(--glacier);background:var(--glacier-soft)}

  /* ---------- inline edit ---------- */
  li.item.editing{cursor:default;display:block;border-color:var(--glacier);box-shadow:0 0 0 3px var(--glacier-soft)}
  .edit-form{display:flex;flex-direction:column;gap:10px;width:100%}
  .edit-form .ef-label{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:-4px}
  .edit-name{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink)}
  .edit-note{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13px;line-height:1.45;color:var(--ink);resize:vertical}
  .edit-name:focus,.edit-note:focus,.edit-cat:focus,.edit-type:focus,.edit-cost:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .edit-opts{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
  .edit-opts .field{display:flex;flex-direction:column;gap:3px}
  .edit-opts .field > span{font-size:10.5px;font-weight:800;letter-spacing:.03em;color:var(--ink-soft);text-transform:uppercase}
  .edit-cat,.edit-type{border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff}
  .edit-cost{border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff;width:120px}
  .edit-ess-wrap{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;user-select:none}
  .edit-ess-wrap.on{background:#FBF3DD;border-color:var(--gold);color:#8a6a1f}
  .edit-ess{width:17px;height:17px;accent-color:var(--gold);margin:0}
  .edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
  .edit-actions .addbtn{padding:8px 18px}
  .edit-actions .reset{padding:8px 14px}

  /* ---------- add row ---------- */
  .add{margin-top:0;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .add h3{margin:0 0 10px;font-size:14px;font-weight:700}
  .add-row{display:flex;gap:8px;flex-wrap:wrap}
  .add input[type=text]{flex:1;min-width:150px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:14px;color:var(--ink)}
  .add input[type=number]{width:120px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:14px;color:var(--ink)}
  .add input:focus,.add select:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .add select{border:1px solid var(--line);border-radius:9px;padding:9px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff}
  .add button.addbtn{border:none;background:var(--ink);color:#fff;border-radius:9px;padding:9px 16px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
  .add button.addbtn:hover{background:var(--glacier)}

  /* ---------- spending ---------- */
  .spend-card{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
  .spend-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .spend-eyebrow{font-size:12px;font-weight:700;color:var(--done);letter-spacing:.02em;margin-bottom:4px}
  .spend-total{font-family:"Fraunces",serif;font-size:27px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1}
  .spend-sub{display:flex;flex-direction:column;gap:3px;font-size:12.5px;color:var(--ink-soft);text-align:right;padding-top:2px}
  .spend-sub b{color:var(--ink);font-variant-numeric:tabular-nums;font-weight:700}
  .spend-toggle-wrap{margin-top:10px}
  .spend-break{margin-top:12px;display:flex;flex-direction:column;gap:9px;border-top:1px dashed var(--line);padding-top:12px}
  .spend-row{display:grid;grid-template-columns:1fr auto;gap:5px 10px;align-items:center;font-size:12.5px}
  .spend-row .scat{color:var(--ink);font-weight:600}
  .spend-row .samt{color:var(--ink-soft);font-variant-numeric:tabular-nums;font-weight:700}
  .spend-bar{grid-column:1/3;height:6px;border-radius:99px;background:#EFEADF;overflow:hidden}
  .spend-bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--done),#7fb0c4)}

  /* ---------- misc ---------- */
  .listbar{display:flex;justify-content:flex-end;margin:8px 2px 0}
  .linkbtn{border:none;background:none;color:var(--glacier);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;padding:4px 6px}
  .linkbtn:hover{text-decoration:underline}
  .foot{margin-top:24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .foot small{color:var(--ink-soft);font-size:12px;flex:1;min-width:200px}
  .foot-btns{display:flex;gap:8px;flex-wrap:wrap}
  .reset{border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:9px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .reset:hover{border-color:var(--sand);color:var(--sand)}
  .reset.danger{color:#b4502a;border-color:#e6c6b6}
  .empty{text-align:center;color:var(--ink-soft);font-size:14px;padding:30px 0}
  .saving{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12px;padding:7px 14px;border-radius:99px;opacity:0;transition:.3s;pointer-events:none}
  .saving.show{opacity:.92}

  /* ---------- modal ---------- */
  .modal{position:fixed;inset:0;background:rgba(27,42,48,.45);display:grid;place-items:center;padding:18px;z-index:50}
  .modal[hidden]{display:none}
  .modal-card{background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:420px;max-height:90vh;overflow:auto;padding:20px}
  .modal-card h3{margin:0 0 14px;font-size:18px}
  .mfield{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .mfield > span{font-size:11px;font-weight:800;letter-spacing:.03em;color:var(--ink-soft);text-transform:uppercase}
  .mfield input,.mfield select{border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-family:inherit;font-size:14px;color:var(--ink);background:#fff}
  .mfield input:focus,.mfield select:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .mfield.row{flex-direction:row;gap:10px}
  .mfield.row label{flex:1;display:flex;flex-direction:column;gap:5px;font-size:11px;font-weight:800;letter-spacing:.03em;color:var(--ink-soft);text-transform:uppercase}
  .mcheck{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink);padding:7px 0;cursor:pointer}
  .mcheck input{width:18px;height:18px;accent-color:var(--glacier)}
  .modal-actions{display:flex;align-items:center;gap:8px;margin-top:10px}
  .modal-actions .addbtn{border:none;background:var(--ink);color:#fff;border-radius:9px;padding:10px 18px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
  .modal-actions .addbtn:hover{background:var(--glacier)}
  .grow{flex:1}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="wrap">
  <div class="topbar">
    <select class="listsel" id="listSelect" aria-label="리스트 선택"></select>
    <button class="iconbtn" id="newListBtn" title="새 리스트 만들기" aria-label="새 리스트">＋</button>
    <button class="iconbtn" id="manageListBtn" title="이 리스트 설정" aria-label="리스트 설정">⚙</button>
  </div>

  <header>
    <div class="climate-strip"></div>
    <div class="head-body">
      <div class="eyebrow">체크리스트</div>
      <h1 id="listTitle">리스트</h1>
      <span class="dday" id="dday" hidden></span>
      <div class="progress-card">
        <div class="progress-top">
          <span class="pct" id="pct">0%</span>
          <span class="label" id="plabel">하나씩 체크해 보세요</span>
        </div>
        <div class="bar"><i id="barfill"></i></div>
        <div class="mini-stats">
          <span class="mini">전체 <b id="m-total">0</b>개 중 <b id="m-done">0</b>개 완료</span>
          <span class="mini buy">🛒 살 것 남음 <b id="m-buy">0</b>개</span>
          <span class="mini">🎒 챙길 것 남음 <b id="m-have">0</b>개</span>
        </div>
      </div>
    </div>
  </header>

  <div class="add">
    <h3>항목 추가</h3>
    <div class="add-row">
      <input type="text" id="newName" placeholder="추가할 항목 이름…" maxlength="60">
      <select id="newCat"></select>
      <select id="newType">
        <option value="buy">🛒 살 것</option>
        <option value="have">🎒 챙길 것</option>
      </select>
      <input type="number" id="newCost" placeholder="금액(원)" min="0" step="100" inputmode="numeric">
      <button class="addbtn" id="addBtn">추가</button>
    </div>
  </div>

  <div class="spend-card" id="spendCard" hidden>
    <div class="spend-top">
      <div>
        <div class="spend-eyebrow">💰 지출 — 사용 금액</div>
        <div class="spend-total" id="spendSpent">₩0</div>
      </div>
      <div class="spend-sub">
        <div>구매 예정 <b id="spendPlanned">₩0</b></div>
        <div>전체 합계 <b id="spendTotal">₩0</b></div>
      </div>
    </div>
    <div class="spend-toggle-wrap"><button class="linkbtn" id="spendToggle" hidden>카테고리별 내역 ▾</button></div>
    <div class="spend-break" id="spendBreak" hidden></div>
  </div>

  <div class="filters" id="filters">
    <button class="chip on" data-f="all">전체</button>
    <button class="chip" data-f="buy">🛒 살 것</button>
    <button class="chip" data-f="have">🎒 챙길 것</button>
    <button class="chip" data-f="ess">⭐ 필수만</button>
    <button class="chip" data-f="left">남은 것만</button>
  </div>

  <div class="listbar"><button class="linkbtn" id="toggleAll">⌃ 전체 접기 / 펼치기</button></div>
  <div id="list"></div>

  <div class="foot">
    <small>⭐ = 필수 · 🛒 살 것 · 🎒 챙길 것 · 데이터는 이 기기에 자동 저장(오프라인) · 백업으로 다른 기기에 옮기세요</small>
    <div class="foot-btns">
      <button class="reset" id="exportBtn">백업 내보내기</button>
      <button class="reset" id="importBtn">복원</button>
      <button class="reset" id="resetBtn">체크 전체 해제</button>
    </div>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>
</div>

<!-- 리스트 만들기/설정 모달 -->
<div class="modal" id="modal" hidden>
  <div class="modal-card">
    <h3 id="modalTitle">새 리스트</h3>
    <label class="mfield"><span>리스트 이름</span>
      <input id="mName" type="text" maxlength="40" placeholder="예: 장보기, 이사 준비, 주간 할 일">
    </label>
    <label class="mfield"><span>아이콘 (이모지)</span>
      <input id="mEmoji" type="text" maxlength="4" placeholder="📋">
    </label>
    <div class="mfield" id="mTemplateWrap"><span>시작 항목</span>
      <select id="mTemplate">
        <option value="blank">빈 리스트로 시작</option>
        <option value="travel">여행 준비물 (신혼여행 항목 전체 복제)</option>
        <option value="shopping">장보기 기본 항목</option>
      </select>
    </div>
    <label class="mcheck"><input type="checkbox" id="mSpending"> 💰 지출 통계 사용 (살 것 금액 합계)</label>
    <label class="mcheck"><input type="checkbox" id="mDday"> 📅 D-day 카운트다운 사용</label>
    <div class="mfield row" id="mDdayRow" hidden>

const APP = { lists:[], currentId:null };
let idbOK = false, _db = null, spendOpen = false;
const APP_KEY = "checklist_app_v2";

// ---------- utils ----------
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function won(n){ return "₩"+Math.round(+n||0).toLocaleString("ko-KR"); }
function withWarn(s){ let t=esc(s); if(t.includes("⚠️")) t=t.replace(/(⚠️[^.]*\.)/,'<span class="warn">$1</span>'); return t; }
function uid(){ return "i"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function val(id){ return document.getElementById(id).value; }
function L(){ return APP.lists.find(l=>l.id===APP.currentId) || APP.lists[0] || null; }
function flashSaved(){ const s=document.getElementById("saving"); s.classList.add("show"); setTimeout(()=>s.classList.remove("show"),900); }

// ---------- IndexedDB ----------
function openDB(){ return new Promise((res,rej)=>{ const r=indexedDB.open("checklist_db",1);
  r.onupgradeneeded=e=>{ const db=e.target.result;
    if(!db.objectStoreNames.contains("lists")) db.createObjectStore("lists",{keyPath:"id"});
    if(!db.objectStoreNames.contains("meta"))  db.createObjectStore("meta",{keyPath:"k"});
  };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function idbAll(){ return new Promise((res,rej)=>{ const q=_db.transaction("lists","readonly").objectStore("lists").getAll(); q.onsuccess=()=>res(q.result||[]); q.onerror=()=>rej(q.error); }); }
function idbMeta(k){ return new Promise((res)=>{ const q=_db.transaction("meta","readonly").objectStore("meta").get(k); q.onsuccess=()=>res(q.result?q.result.v:null); q.onerror=()=>res(null); }); }
function idbPut(l){ return new Promise((res,rej)=>{ const q=_db.transaction("lists","readwrite").objectStore("lists").put(l); q.onsuccess=()=>res(); q.onerror=()=>rej(q.error); }); }
function idbDel(id){ return new Promise((res,rej)=>{ const q=_db.transaction("lists","readwrite").objectStore("lists").delete(id); q.onsuccess=()=>res(); q.onerror=()=>rej(q.error); }); }
function idbSetMeta(k,v){ return new Promise((res,rej)=>{ const q=_db.transaction("meta","readwrite").objectStore("meta").put({k,v}); q.onsuccess=()=>res(); q.onerror=()=>rej(q.error); }); }
function idbClear(){ return new Promise((res,rej)=>{ const q=_db.transaction("lists","readwrite").objectStore("lists").clear(); q.onsuccess=()=>res(); q.onerror=()=>rej(q.error); }); }

function fallbackSaveAll(){ try{ localStorage.setItem(APP_KEY, JSON.stringify(APP)); }catch(e){} }
// 현재 리스트 + 현재 선택 저장
function saveCur(){ flashSaved(); const l=L(); if(!l) return;
  if(idbOK){ idbPut(l).catch(fallbackSaveAll); idbSetMeta("currentId",APP.currentId).catch(()=>{}); }
  else fallbackSaveAll();
}
function persistList(l){ if(idbOK) idbPut(l).catch(fallbackSaveAll); else fallbackSaveAll(); }
function persistMeta(){ if(idbOK) idbSetMeta("currentId",APP.currentId).catch(()=>{}); else fallbackSaveAll(); }

// ---------- 리스트 생성/마이그레이션 ----------
function newList(name,emoji,options,kind){
  let items=[], catOrder=[];
  if(kind==="travel"){
    catOrder=DATA.map(d=>d.cat);
    DATA.forEach(d=>d.items.forEach(it=>items.push({id:uid(),cat:d.cat,name:it.name,type:it.type,ess:it.ess,note:it.note,cost:0,checked:false,order:items.length})));
  } else if(kind==="shopping"){
    catOrder=["식료품","생활용품","기타"];
    [["식료품","우유","buy"],["식료품","계란","buy"],["식료품","빵","buy"],["생활용품","휴지","buy"],["생활용품","세제","buy"]]
      .forEach(([c,n,t])=>items.push({id:uid(),cat:c,name:n,type:t,ess:false,note:"",cost:0,checked:false,order:items.length}));
  } else { catOrder=["할 일"]; }
  return { id:uid(), name:name||"새 리스트", emoji:emoji||"📋", createdAt:Date.now(), order:APP.lists.length,
           options:options||{dday:null,spending:false}, catOrder, collapsed:{}, filter:"all", items };
}

// 최초 실행: 기존 localStorage(eutrip_checklist_v1) 데이터를 그대로 이전 (체크·금액·수정 보존)
// 구 기본항목 id를 DATA 순서대로 매핑 (개수·순서 동일)
const OLD_IDS=["d1","d2","d3","d4","d5","d6",
  "e1","e2","e3","e4","e5","e6",
  "c1","c2","c3","c4","c5","c6","c7",
  "w1","w2","w3","w4","w5","w6","w7","w8","w9","w10",
  "s1","s2","s10","s3","s6","s7","s4","s8","s5",
  "h1","h2","h3","h4","h5","h6",
  "m1","m2","m3","m4","m5","m6","m7",
  "u1","u2","u3","u4","u5","u6"];
function buildHoneymoonList(){
  let old=null; try{ const raw=localStorage.getItem("eutrip_checklist_v1"); if(raw) old=JSON.parse(raw); }catch(e){}
  const deleted=new Set((old&&old.deleted)||[]);
  const edits=(old&&old.edits)||{}, costs=(old&&old.costs)||{}, checked=(old&&old.checked)||{};
  const items=[]; let order=0, k=0; const catOrder=DATA.map(d=>d.cat);
  DATA.forEach(d=>d.items.forEach(it=>{
    const oid=OLD_IDS[k++]; const ov=(old&&edits[oid])||{};
    if(old && deleted.has(oid)) return;             // 옛 앱에서 삭제했던 기본항목은 제외
    const cat=ov.cat||d.cat; if(!catOrder.includes(cat)) catOrder.push(cat);
    items.push({id:uid(), cat, name:ov.name||it.name, type:ov.type||it.type,
      ess: ov.ess!==undefined?ov.ess:it.ess, note: ov.note!==undefined?ov.note:it.note,
      cost:+costs[oid]||0, checked:!!checked[oid], order:order++});
  }));
  // 사용자가 추가했던 항목 이전
  if(old&&Array.isArray(old.custom)){
    old.custom.forEach(c=>{ const ov=edits[c.id]||{};
      const cat=ov.cat||c.cat||"편의용품"; if(!catOrder.includes(cat)) catOrder.push(cat);
      items.push({id:uid(), cat, name:ov.name||c.name, type:ov.type||c.type||"buy",
        ess: ov.ess!==undefined?ov.ess:!!c.ess, note: ov.note!==undefined?ov.note:(c.note||""),
        cost:+costs[c.id]||0, checked:!!checked[c.id], order:order++});
    });
  }
  return { id:"hm_"+uid(), name:"유럽 신혼여행 준비", emoji:"✈️", createdAt:Date.now(), order:0,
    options:{ dday:{start:"2026-06-21", end:"2026-07-04"}, spending:true },
    catOrder, collapsed:(old&&old.collapsed)||{}, filter:(old&&old.filter)||"all", items };
}

// ---------- 모델 ----------
function passFilter(it,filter){
  switch(filter){
    case "buy": return it.type==="buy";
    case "have": return it.type==="have";
    case "ess": return !!it.ess;
    case "left": return !it.checked;
    default: return true;
  }
}
function catsInOrder(list){
  const seen=new Set(list.catOrder); const extra=[];
  list.items.forEach(it=>{ if(!seen.has(it.cat)){ seen.add(it.cat); extra.push(it.cat); } });
  return list.catOrder.concat(extra);
}

// ---------- 렌더 ----------
const CHECK_SVG='<svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>';
function render(){
  const list=L(); if(!list) return;
  document.getElementById("listTitle").textContent = `${list.emoji||"📋"} ${list.name}`;
  document.getElementById("spendCard").hidden = !list.options.spending;
  setDday();
  refreshAddCats();

  const byCat={}; list.items.forEach(it=>{ (byCat[it.cat]=byCat[it.cat]||[]).push(it); });
  const listEl=document.getElementById("list"); listEl.innerHTML=""; let shown=0;
  catsInOrder(list).forEach((cat,i)=>{
    const all=(byCat[cat]||[]);
    const items=all.filter(it=>passFilter(it,list.filter));
    if(items.length===0) return;
    shown+=items.length;
    const doneN=items.filter(it=>it.checked).length;
    const collapsed=!!list.collapsed[cat];
    const sec=document.createElement("div"); sec.className="section"+(collapsed?" collapsed":"");
    sec.innerHTML=`<div class="sec-head" data-cat="${esc(cat)}">
        <span class="sec-num">${String(i+1).padStart(2,"0")}</span>
        <span class="sec-title">${esc(cat)}</span>
        <span class="sec-count">${doneN}/${items.length}</span>
        <span class="sec-rule"></span>
        <span class="sec-chev">▾</span>
      </div>`;
    if(!collapsed){
      const ul=document.createElement("ul");
      items.forEach(it=>{
        const li=document.createElement("li");
        li.className="item"+(it.checked?" checked":""); li.dataset.id=it.id;
        const tag = it.type==="buy" ? '<span class="tag buy">🛒 살 것</span>' : '<span class="tag have">🎒 챙길 것</span>';
        const star = it.ess ? '<span class="star" title="필수">⭐</span>' : '';
        const price = (+it.cost>0) ? `<span class="price" title="금액 수정">${won(it.cost)}</span>` : '';
        const note = it.note ? `<div class="note">${withWarn(it.note)}</div>` : '';
        const actions = `<div class="item-actions">`
          + `<button class="del edit" title="수정" data-edit="${it.id}" aria-label="수정">✎</button>`
          + `<button class="del" title="삭제" data-del="${it.id}" aria-label="삭제">×</button></div>`;
        li.innerHTML=`<span class="box">${CHECK_SVG}</span>
          <div class="body"><div class="line1"><span class="name">${esc(it.name)}</span>${tag}${star}${price}</div>${note}</div>${actions}`;
        ul.appendChild(li);
      });
      sec.appendChild(ul);
    }
    listEl.appendChild(sec);
  });
  if(shown===0){ listEl.innerHTML='<div class="empty">항목이 없어요. 위에서 추가하거나 필터를 바꿔보세요.</div>'; }
  updateProgress(); updateSpend();
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on", c.dataset.f===list.filter));
}

function updateProgress(){
  const items=L().items, total=items.length, done=items.filter(it=>it.checked).length;
  const pct= total? Math.round(done/total*100):0;
  document.getElementById("pct").textContent=pct+"%";
  document.getElementById("barfill").style.width=pct+"%";
  document.getElementById("m-total").textContent=total;
  document.getElementById("m-done").textContent=done;
  document.getElementById("m-buy").textContent=items.filter(it=>it.type==="buy"&&!it.checked).length;
  document.getElementById("m-have").textContent=items.filter(it=>it.type==="have"&&!it.checked).length;
  document.getElementById("plabel").textContent = total===0 ? "항목을 추가해 보세요"
    : (pct===100 ? "전부 완료! 🎉" : (done===0? "하나씩 체크해 보세요" : `잘하고 있어요 — ${total-done}개 남음`));
}

function updateSpend(){
  const items=L().items; let spent=0, planned=0; const byCat={};
  items.forEach(it=>{ const c=+it.cost||0; if(c<=0) return; if(it.checked) spent+=c; else planned+=c; byCat[it.cat]=(byCat[it.cat]||0)+c; });
  document.getElementById("spendSpent").textContent=won(spent);
  document.getElementById("spendPlanned").textContent=won(planned);
  document.getElementById("spendTotal").textContent=won(spent+planned);
  const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const toggle=document.getElementById("spendToggle"), breakEl=document.getElementById("spendBreak");
  toggle.hidden = cats.length===0;
  if(cats.length===0){ spendOpen=false; breakEl.hidden=true; breakEl.innerHTML=""; return; }
  toggle.textContent = spendOpen?"카테고리별 내역 ▴":"카테고리별 내역 ▾";
  breakEl.hidden = !spendOpen;
  if(spendOpen){
    const max=cats[0][1]||1;
    breakEl.innerHTML=cats.map(([cat,amt])=>`<div class="spend-row"><span class="scat">${esc(cat)}</span><span class="samt">${won(amt)}</span><span class="spend-bar"><i style="width:${Math.round(amt/max*100)}%"></i></span></div>`).join("");
  }
}

function setDday(){
  const el=document.getElementById("dday"); const dd=L().options.dday;
  if(!dd||!dd.start){ el.hidden=true; return; }
  el.hidden=false;
  const ms=864e5, p=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
  const start=p(dd.start), end=dd.end?p(dd.end):start;
  const n=new Date(); const today=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  const dStart=Math.round((start-today)/ms), dEnd=Math.round((end-today)/ms);
  let txt,s;
  if(dStart>0){ txt=`📅 D-${dStart}`; s="soon"; }
  else if(dStart===0){ txt="🎉 D-DAY · 오늘이에요!"; s="go"; }
  else if(dEnd>=0){ txt=`▶ 진행 중 · ${-dStart+1}일차`; s="go"; }
  else { txt="✅ 종료 · 수고했어요"; s="done"; }
  el.textContent=txt; el.dataset.s=s;
}

// ---------- 항목 추가/수정/삭제 ----------
function refreshAddCats(){
  const sel=document.getElementById("newCat"); const list=L(); if(!list) return;
  const cur=sel.value;
  sel.innerHTML="";
  catsInOrder(list).forEach(c=>{ const o=document.createElement("option"); o.value=c; o.textContent=c; sel.appendChild(o); });
  const o=document.createElement("option"); o.value="__new"; o.textContent="＋ 새 분류…"; sel.appendChild(o);
  if(cur && [...sel.options].some(op=>op.value===cur)) sel.value=cur;
}
function addItem(){
  const list=L(); if(!list) return;
  const name=val("newName").trim(); if(!name) return;
  let cat=val("newCat");
  if(cat==="__new"){ const c=(prompt("새 분류 이름을 입력하세요")||"").trim(); if(!c) return; cat=c; if(!list.catOrder.includes(cat)) list.catOrder.push(cat); }
  const type=val("newType");
  const cost=Math.max(0,Math.round(+val("newCost")||0));
  list.items.push({id:uid(),cat,name,type,ess:false,note:"",cost,checked:false,order:Date.now()});
  document.getElementById("newName").value=""; document.getElementById("newCost").value="";
  saveCur(); render();
}

function openEdit(id){
  const list=L(); const it=list.items.find(x=>x.id===id); if(!it) return;
  const li=document.querySelector(`li.item[data-id="${id}"]`); if(!li) return;
  const cats=catsInOrder(list); if(!cats.includes(it.cat)) cats.push(it.cat);
  const catOpts=cats.map(c=>`<option value="${esc(c)}"${c===it.cat?" selected":""}>${esc(c)}</option>`).join("")
    + `<option value="__new">＋ 새 분류…</option>`;
  li.classList.add("editing");
  li.innerHTML=`<div class="edit-form">
      <div class="ef-label">항목 이름</div>
      <input class="edit-name" type="text" maxlength="80" value="${esc(it.name)}" placeholder="항목 이름">
      <div class="ef-label">메모</div>
      <textarea class="edit-note" rows="3" maxlength="400" placeholder="메모 (선택)">${esc(it.note||"")}</textarea>
      <div class="edit-opts">
        <label class="field"><span>분류</span><select class="edit-cat">${catOpts}</select></label>
        <label class="field"><span>유형</span><select class="edit-type">
          <option value="buy"${it.type==="buy"?" selected":""}>🛒 살 것</option>
          <option value="have"${it.type==="have"?" selected":""}>🎒 챙길 것</option>
        </select></label>
        <label class="field"><span>금액(원)</span>
          <input class="edit-cost" type="number" min="0" step="100" inputmode="numeric" value="${(+it.cost>0)?(+it.cost):""}" placeholder="금액"></label>
        <label class="edit-ess-wrap${it.ess?" on":""}"><input class="edit-ess" type="checkbox"${it.ess?" checked":""}> ⭐ 필수</label>
      </div>
      <div class="edit-actions">
        <button class="reset" data-canceledit="1">취소</button>
        <button class="addbtn" data-savedit="${id}">저장</button>
      </div></div>`;
  const nm=li.querySelector(".edit-name"); nm.focus(); nm.setSelectionRange(nm.value.length,nm.value.length);
  const essBox=li.querySelector(".edit-ess");
  essBox.addEventListener("change",()=>li.querySelector(".edit-ess-wrap").classList.toggle("on",essBox.checked));
}
function saveEdit(id){
  const list=L(); const it=list.items.find(x=>x.id===id); if(!it) return;
  const li=document.querySelector(`li.item[data-id="${id}"]`); if(!li) return;
  const name=li.querySelector(".edit-name").value.trim(); if(!name){ alert("이름을 입력해 주세요."); return; }
  let cat=li.querySelector(".edit-cat").value;
  if(cat==="__new"){ const c=(prompt("새 분류 이름")||"").trim(); if(!c) return; cat=c; if(!list.catOrder.includes(cat)) list.catOrder.push(cat); }
  it.name=name;
  it.note=li.querySelector(".edit-note").value.trim();
  it.type=li.querySelector(".edit-type").value;
  it.cat=cat;
  it.ess=li.querySelector(".edit-ess").checked;
  it.cost=Math.max(0,Math.round(+li.querySelector(".edit-cost").value||0));
  saveCur(); render();
}

// ---------- 리스트 전환/모달 ----------
function buildListSelect(){
  const sel=document.getElementById("listSelect"); sel.innerHTML="";
  APP.lists.forEach(l=>{ const o=document.createElement("option"); o.value=l.id; o.textContent=`${l.emoji||"📋"} ${l.name}`; if(l.id===APP.currentId) o.selected=true; sel.appendChild(o); });
}
let modalMode="new";
function showModal(on){ document.getElementById("modal").hidden=!on; }
function openNewList(){
  modalMode="new";
  document.getElementById("modalTitle").textContent="새 리스트 만들기";
  document.getElementById("mName").value="";
  document.getElementById("mEmoji").value="📋";
  document.getElementById("mTemplateWrap").hidden=false;
  document.getElementById("mTemplate").value="blank";
  document.getElementById("mSpending").checked=false;
  document.getElementById("mDday").checked=false;
  document.getElementById("mDdayRow").hidden=true;
  document.getElementById("mStart").value=""; document.getElementById("mEnd").value="";
  document.getElementById("mDelete").hidden=true;
  showModal(true); setTimeout(()=>document.getElementById("mName").focus(),50);
}
function openManageList(){
  const l=L(); modalMode="edit";
  document.getElementById("modalTitle").textContent="리스트 설정";
  document.getElementById("mName").value=l.name;
  document.getElementById("mEmoji").value=l.emoji||"📋";
  document.getElementById("mTemplateWrap").hidden=true;
  document.getElementById("mSpending").checked=!!l.options.spending;
  const hasD=!!(l.options.dday&&l.options.dday.start);
  document.getElementById("mDday").checked=hasD;
  document.getElementById("mDdayRow").hidden=!hasD;
  document.getElementById("mStart").value=hasD?l.options.dday.start:"";
  document.getElementById("mEnd").value=hasD&&l.options.dday.end?l.options.dday.end:"";
  document.getElementById("mDelete").hidden = APP.lists.length<=1;
  showModal(true);
}
function modalSave(){
  const name=document.getElementById("mName").value.trim(); if(!name){ alert("리스트 이름을 입력해 주세요."); return; }
  const emoji=document.getElementById("mEmoji").value.trim()||"📋";
  const spending=document.getElementById("mSpending").checked;
  const useD=document.getElementById("mDday").checked;
  const start=document.getElementById("mStart").value, end=document.getElementById("mEnd").value;
  const dday = (useD&&start)? {start, end:end||""} : null;
  const options={ dday, spending };
  if(modalMode==="new"){
    const kind=document.getElementById("mTemplate").value;
    const l=newList(name,emoji,options,kind);
    APP.lists.push(l); APP.currentId=l.id;
    persistList(l); persistMeta();
  } else {
    const l=L(); l.name=name; l.emoji=emoji; l.options=options; persistList(l); persistMeta();
  }
  showModal(false); buildListSelect(); render();
}
function modalDelete(){
  if(APP.lists.length<=1){ alert("마지막 리스트는 삭제할 수 없어요."); return; }
  const l=L(); if(!confirm(`'${l.name}' 리스트를 삭제할까요? 되돌릴 수 없습니다.`)) return;
  APP.lists=APP.lists.filter(x=>x.id!==l.id);
  if(idbOK) idbDel(l.id).catch(()=>{});
  APP.currentId=APP.lists[0].id; persistMeta(); if(!idbOK) fallbackSaveAll();
  showModal(false); buildListSelect(); render();
}

// ---------- 이벤트 ----------
document.getElementById("list").addEventListener("click",e=>{
  if(!L()) return;
  const head=e.target.closest(".sec-head");
  if(head){ const cat=head.dataset.cat; const c=L().collapsed; c[cat]=!c[cat]; saveCur(); render(); return; }
  if(e.target.closest(".edit-form")){
    const sv=e.target.closest("[data-savedit]");
    if(sv) saveEdit(sv.dataset.savedit);
    else if(e.target.closest("[data-canceledit]")) render();
    return;
  }
  const ed=e.target.closest("[data-edit]"); if(ed){ openEdit(ed.dataset.edit); return; }
  const pr=e.target.closest(".price"); if(pr){ const row=pr.closest("li.item"); if(row) openEdit(row.dataset.id); return; }
  const del=e.target.closest("[data-del]");
  if(del){ const id=del.dataset.del; const it=L().items.find(x=>x.id===id);
    if(!confirm(`'${it?it.name:"이 항목"}'을(를) 삭제할까요?`)) return;
    L().items=L().items.filter(x=>x.id!==id); saveCur(); render(); return; }
  const li=e.target.closest("li.item"); if(!li||li.classList.contains("editing")) return;
  const it=L().items.find(x=>x.id===li.dataset.id); if(!it) return;
  it.checked=!it.checked; saveCur(); render();
});

document.getElementById("filters").addEventListener("click",e=>{
  const b=e.target.closest(".chip"); if(!b||!L()) return;
  L().filter=b.dataset.f; saveCur(); render();
});
document.getElementById("toggleAll").addEventListener("click",()=>{
  if(!L()) return; const cats=catsInOrder(L()); const anyOpen=cats.some(c=>!L().collapsed[c]);
  cats.forEach(c=>{ L().collapsed[c]=anyOpen; }); saveCur(); render();
});
document.getElementById("spendToggle").addEventListener("click",()=>{ spendOpen=!spendOpen; updateSpend(); });
document.getElementById("addBtn").addEventListener("click",addItem);
document.getElementById("newName").addEventListener("keydown",e=>{ if(e.key==="Enter") addItem(); });
document.getElementById("newCost").addEventListener("keydown",e=>{ if(e.key==="Enter") addItem(); });
document.getElementById("resetBtn").addEventListener("click",()=>{
  if(!L()) return; if(confirm("이 리스트의 체크를 전부 해제할까요?")){ L().items.forEach(it=>it.checked=false); saveCur(); render(); }
});

// 리스트 전환/모달
document.getElementById("listSelect").addEventListener("change",e=>{ APP.currentId=e.target.value; persistMeta(); spendOpen=false; render(); });
document.getElementById("newListBtn").addEventListener("click",openNewList);
document.getElementById("manageListBtn").addEventListener("click",openManageList);
document.getElementById("mCancel").addEventListener("click",()=>showModal(false));
document.getElementById("mSave").addEventListener("click",modalSave);
document.getElementById("mDelete").addEventListener("click",modalDelete);
document.getElementById("mDday").addEventListener("change",e=>{ document.getElementById("mDdayRow").hidden=!e.target.checked; });
document.getElementById("modal").addEventListener("click",e=>{ if(e.target.id==="modal") showModal(false); });

// 백업/복원 (전체 리스트)
document.getElementById("exportBtn").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify({version:2,lists:APP.lists,currentId:APP.currentId},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="checklist-backup.json"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
});
document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=async ()=>{
    try{
      const v=JSON.parse(r.result);
      const lists = Array.isArray(v.lists) ? v.lists : (Array.isArray(v)? v : null);
      if(!lists||!lists.length) throw 0;
      if(!confirm("백업을 불러오면 현재 모든 리스트가 백업 내용으로 교체됩니다. 진행할까요?")){ e.target.value=""; return; }
      APP.lists=lists; APP.currentId=(v.currentId&&lists.some(l=>l.id===v.currentId))?v.currentId:lists[0].id;
      if(idbOK){ await idbClear(); for(const l of APP.lists){ try{await idbPut(l);}catch(_){} } await idbSetMeta("currentId",APP.currentId); }
      else fallbackSaveAll();
      buildListSelect(); render(); alert("복원 완료!");
    }catch(err){ alert("파일을 읽을 수 없어요. 이 앱에서 내보낸 백업 JSON인지 확인해 주세요."); }
    e.target.value="";
  };
  r.readAsText(f);
});

function registerSW(){ if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); } }

// ---------- init ----------
(async function init(){
  try{ _db=await openDB(); idbOK=true; }catch(e){ idbOK=false; }
  let lists=[], curId=null;
  if(idbOK){ try{ lists=await idbAll(); curId=await idbMeta("currentId"); }catch(e){ idbOK=false; } }
  if(!idbOK){ try{ const raw=localStorage.getItem(APP_KEY); if(raw){ const a=JSON.parse(raw); lists=a.lists||[]; curId=a.currentId; } }catch(e){} }
  if(!lists.length){ const hm=buildHoneymoonList(); lists=[hm]; curId=hm.id; }
  APP.lists=lists.sort((a,b)=>(a.order||0)-(b.order||0));
  APP.currentId=(curId&&APP.lists.some(l=>l.id===curId))?curId:APP.lists[0].id;
  if(idbOK){ for(const l of APP.lists){ try{await idbPut(l);}catch(e){} } try{await idbSetMeta("currentId",APP.currentId);}catch(e){} }
  else fallbackSaveAll();
  buildListSelect(); render(); registerSW();
})();
</script>
