<!-- 범용 체크리스트 PWA — 멀티 리스트 · IndexedDB · 다크모드 · 드래그정렬 · 오프라인 -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>체크리스트</title>
<script>/* 테마 선적용(깜빡임 방지) */(function(){try{var t=localStorage.getItem("ck_theme")||"auto";var d=t==="dark"||(t==="auto"&&matchMedia("(prefers-color-scheme:dark)").matches);document.documentElement.dataset.theme=d?"dark":"light";}catch(e){}})();</script>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2E6E8E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="체크리스트">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#FBFAF7; --surface:#ffffff; --surface-2:#FBFAF7;
    --ink:#1B2A30; --ink-soft:#5A6A6F; --line:#E6E1D7;
    --glacier:#2E6E8E; --glacier-soft:#E5F0F4;
    --sand:#C2774A; --sand-soft:#F6EAE0;
    --gold:#B7892F; --gold-soft:#FBF3DD;
    --done:#3C8C6E; --done-soft:#E4F1EA;
    --warn:#b4502a;
    --track:#ECE7DC;
    --shadow:0 1px 2px rgba(27,42,48,.05), 0 8px 24px rgba(27,42,48,.06);
    --shadow-lg:0 20px 60px rgba(0,0,0,.22);
  }
  :root[data-theme="dark"]{
    --paper:#0F1316; --surface:#171D21; --surface-2:#1B2226;
    --ink:#E8EDEF; --ink-soft:#9DAEB3; --line:#2A3338;
    --glacier:#6FB6D6; --glacier-soft:#11313D;
    --sand:#E0966A; --sand-soft:#33241B;
    --gold:#D2AC57; --gold-soft:#2C2412;
    --done:#5BC79B; --done-soft:#11302A;
    --warn:#E8956B;
    --track:#262E33;
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 10px 30px rgba(0,0,0,.45);
    --shadow-lg:0 24px 70px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper)}
  body{margin:0;color:var(--ink);font-family:"Pretendard",system-ui,sans-serif;line-height:1.55;letter-spacing:-.01em;
    transition:background .3s,color .3s;padding-bottom:env(safe-area-inset-bottom)}
  .wrap{max-width:820px;margin:0 auto;padding:18px 18px 96px}

  /* ---------- app bar ---------- */
  .appbar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .brand{font-family:"Fraunces",serif;font-weight:600;font-size:20px;color:var(--ink);display:flex;align-items:center;gap:7px;flex:1}
  .brand .mk{display:grid;place-items:center;width:26px;height:26px;border-radius:8px;background:var(--glacier);color:#fff;font-size:15px}

  .topbar{display:flex;gap:8px;align-items:center;margin-bottom:14px}
  .listsel{flex:1;min-width:0;border:1px solid var(--line);background:var(--surface);border-radius:12px;
    padding:11px 12px;font-family:inherit;font-size:15px;font-weight:700;color:var(--ink);box-shadow:var(--shadow)}
  .listsel:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .iconbtn{flex:none;width:44px;height:44px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
    color:var(--ink-soft);font-size:19px;cursor:pointer;display:grid;place-items:center;transition:.15s;box-shadow:var(--shadow)}
  .iconbtn:hover{border-color:var(--glacier);color:var(--glacier);background:var(--glacier-soft)}
  .iconbtn:active{transform:scale(.92)}
  .iconbtn.ghost{box-shadow:none;background:transparent;border-color:transparent;width:38px;height:38px;font-size:18px}
  .iconbtn.ghost:hover{background:var(--glacier-soft)}

  /* ---------- header ---------- */
  header{background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
  .climate-strip{height:6px;background:linear-gradient(90deg,var(--glacier) 0%,#7fb0c4 38%,#e7c98f 62%,var(--sand) 100%)}
  .head-body{padding:18px 20px}
  .eyebrow{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--glacier);font-weight:700;margin-bottom:6px}
  h1{font-weight:700;font-size:24px;line-height:1.18;margin:0;letter-spacing:-.015em}
  .dday{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:13px;font-weight:700;
    padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);font-variant-numeric:tabular-nums}
  .dday[data-s="soon"]{background:var(--glacier-soft);border-color:transparent;color:var(--glacier)}
  .dday[data-s="go"]{background:var(--done-soft);border-color:transparent;color:var(--done)}
  .dday[data-s="done"]{background:var(--sand-soft);border-color:transparent;color:var(--sand)}

  .progress-card{margin-top:16px;display:flex;align-items:center;gap:16px}
  .ring{--p:0;flex:none;width:64px;height:64px;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(var(--done) calc(var(--p)*1%), var(--track) 0);transition:--p .6s cubic-bezier(.4,0,.2,1)}
  @property --p{syntax:'<number>';inherits:false;initial-value:0}
  .ring .pin{width:50px;height:50px;border-radius:50%;background:var(--surface);display:grid;place-items:center;
    font-weight:800;font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums}
  .pmeta{flex:1;min-width:0}
  .plabel{font-size:14px;font-weight:600;color:var(--ink)}
  .mini-stats{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap}
  .mini{font-size:12.5px;color:var(--ink-soft)}
  .mini b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
  .mini .buy{color:var(--sand)}

  /* ---------- add ---------- */
  .add{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .add h3{margin:0 0 10px;font-size:14px;font-weight:700}
  .add-row{display:flex;gap:8px;flex-wrap:wrap}
  .add input[type=text]{flex:1;min-width:150px;border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface)}
  .add input[type=number]{width:118px;border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface)}
  .add input:focus,.add select:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .add select{border:1px solid var(--line);border-radius:9px;padding:9px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface)}
  .addbtn{border:none;background:var(--glacier);color:#fff;border-radius:9px;padding:10px 16px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:.15s}
  .addbtn:hover{filter:brightness(1.06)}
  .addbtn:active{transform:scale(.96)}

  /* ---------- spending ---------- */
  .spend-card{margin-top:16px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
  .spend-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .spend-eyebrow{font-size:12px;font-weight:700;color:var(--done);letter-spacing:.02em;margin-bottom:4px}
  .spend-total{font-family:"Fraunces",serif;font-size:27px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1}
  .spend-sub{display:flex;flex-direction:column;gap:3px;font-size:12.5px;color:var(--ink-soft);text-align:right;padding-top:2px}
  .spend-sub b{color:var(--ink);font-variant-numeric:tabular-nums;font-weight:700}
  .spend-toggle-wrap{margin-top:10px}
  .spend-break{margin-top:12px;display:flex;flex-direction:column;gap:9px;border-top:1px dashed var(--line);padding-top:12px}
  .spend-row{display:grid;grid-template-columns:1fr auto;gap:5px 10px;align-items:center;font-size:12.5px}
  .spend-row .scat{color:var(--ink);font-weight:600}
  .spend-row .samt{color:var(--ink-soft);font-variant-numeric:tabular-nums;font-weight:700}
  .spend-bar{grid-column:1/3;height:6px;border-radius:99px;background:var(--track);overflow:hidden}
  .spend-bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--done),#7fb0c4);transition:width .5s}

  /* ---------- toolbar / filters ---------- */
  .toolbar{display:flex;gap:8px;margin:16px 0 4px}
  .search{flex:1;border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:10px 12px;font-family:inherit;font-size:14px;color:var(--ink)}
  .search:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .sortsel{border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:0 10px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-soft)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px;position:sticky;top:0;z-index:5;background:var(--paper);padding:8px 0}
  .chip{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);padding:7px 13px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .chip:hover{border-color:var(--glacier);color:var(--glacier)}
  .chip.on{background:var(--glacier);border-color:var(--glacier);color:#fff}

  /* ---------- sections ---------- */
  .listbar{display:flex;justify-content:flex-end;margin:6px 2px 0}
  .linkbtn{border:none;background:none;color:var(--glacier);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;padding:4px 6px}
  .linkbtn:hover{text-decoration:underline}
  .section{margin-top:20px}
  .sec-head{display:flex;align-items:center;gap:10px;margin:0 2px 10px;cursor:pointer;user-select:none}
  .sec-num{font-family:"Fraunces",serif;font-size:13px;color:var(--sand);font-weight:600;min-width:22px}
  .sec-title{font-size:16px;font-weight:700}
  .sec-count{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .sec-rule{flex:1;height:1px;background:var(--line)}
  .sec-chev{color:var(--ink-soft);font-size:12px;transition:transform .25s;margin-left:2px}
  .section.collapsed .sec-chev{transform:rotate(-90deg)}

  ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  li.item{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);
    border-radius:13px;padding:13px 14px;box-shadow:var(--shadow);transition:border-color .18s,background .18s,transform .12s;cursor:pointer;
    animation:itemIn .28s cubic-bezier(.2,.7,.3,1) both}
  @keyframes itemIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  li.item:hover{border-color:var(--glacier)}
  li.item:active{transform:scale(.995)}
  li.item.checked{background:var(--done-soft);border-color:transparent}
  li.item.checked .name{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--done)}
  li.item.removing{overflow:hidden;animation:none;transition:height .22s ease,opacity .22s ease,padding .22s,margin .22s,transform .22s}
  li.item.pop{animation:pop .35s cubic-bezier(.2,.8,.3,1.2)}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
  li.item.dragging{opacity:.85;box-shadow:var(--shadow-lg);border-color:var(--glacier);transform:scale(1.01);cursor:grabbing;z-index:3;position:relative}
  .box{flex:none;width:24px;height:24px;border-radius:8px;border:2px solid var(--ink-soft);background:var(--surface);
    margin-top:0;display:grid;place-items:center;transition:.18s;opacity:.55}
  .box svg{width:14px;height:14px;stroke:#fff;stroke-width:3.4;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:20;stroke-dashoffset:20;transition:stroke-dashoffset .25s ease}
  li.item.checked .box{background:var(--done);border-color:var(--done);opacity:1;animation:boxpop .3s ease}
  @keyframes boxpop{0%{transform:scale(.8)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
  li.item.checked .box svg{stroke-dashoffset:0}
  .body{flex:1;min-width:0}
  .line1{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .name{font-size:15px;font-weight:600;word-break:break-word}
  .tag{font-size:10.5px;font-weight:800;letter-spacing:.02em;padding:2px 7px;border-radius:6px;white-space:nowrap}
  .tag.buy{background:var(--sand-soft);color:var(--sand)}
  .tag.have{background:var(--glacier-soft);color:var(--glacier)}
  .star{color:var(--gold);font-size:12px;font-weight:800}
  .price{font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap;background:var(--done-soft);color:var(--done);cursor:pointer;font-variant-numeric:tabular-nums}
  .note{font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.45;white-space:pre-wrap}
  .note .warn{color:var(--warn);font-weight:600}
  .del{flex:none;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
    color:var(--ink-soft);font-size:19px;line-height:1;cursor:pointer;padding:0;display:grid;place-items:center;transition:.15s}
  .del:hover{border-color:var(--sand);color:var(--sand);background:var(--sand-soft)}
  .del:active{transform:scale(.9)}
  .item-actions{display:flex;gap:6px;align-self:center}
  .del.edit:hover{border-color:var(--glacier);color:var(--glacier);background:var(--glacier-soft)}
  .del.drag{cursor:grab;font-size:16px;touch-action:none}
  .del.drag:hover{border-color:var(--glacier);color:var(--glacier);background:var(--glacier-soft)}

  /* ---------- inline edit ---------- */
  li.item.editing{cursor:default;display:block;border-color:var(--glacier);box-shadow:0 0 0 3px var(--glacier-soft);animation:none}
  .edit-form{display:flex;flex-direction:column;gap:10px;width:100%}
  .ef-label{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:-4px}
  .edit-name{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);background:var(--surface)}
  .edit-note{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13px;line-height:1.45;color:var(--ink);background:var(--surface);resize:vertical}
  .edit-name:focus,.edit-note:focus,.edit-cat:focus,.edit-type:focus,.edit-cost:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .edit-opts{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
  .edit-opts .field{display:flex;flex-direction:column;gap:3px}
  .edit-opts .field > span{font-size:10.5px;font-weight:800;letter-spacing:.03em;color:var(--ink-soft);text-transform:uppercase}
  .edit-cat,.edit-type{border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface)}
  .edit-cost{border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);width:120px}
  .edit-ess-wrap{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;user-select:none}
  .edit-ess-wrap.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
  .edit-ess{width:17px;height:17px;accent-color:var(--gold);margin:0}
  .edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
  .edit-actions .addbtn{padding:8px 18px}

  /* ---------- footer ---------- */
  .foot{margin-top:24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .foot small{color:var(--ink-soft);font-size:12px;flex:1;min-width:200px}
  .foot-btns{display:flex;gap:8px;flex-wrap:wrap}
  .reset{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:9px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
  .reset:hover{border-color:var(--sand);color:var(--sand)}
  .reset.danger{color:var(--warn);border-color:var(--warn)}
  .empty{text-align:center;color:var(--ink-soft);font-size:14px;padding:46px 16px}
  .empty .big{font-size:40px;display:block;margin-bottom:10px;opacity:.7}

  /* ---------- FAB ---------- */
  .fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:18px;
    border:none;background:var(--glacier);color:#fff;font-size:28px;line-height:1;cursor:pointer;box-shadow:0 8px 24px rgba(46,110,142,.45);
    display:grid;place-items:center;z-index:20;transition:transform .15s}
  .fab:active{transform:scale(.9)}

  /* ---------- toast ---------- */
  #toastWrap{position:fixed;left:0;right:0;bottom:calc(84px + env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;gap:8px;z-index:70;pointer-events:none}
  .toast{pointer-events:auto;background:var(--ink);color:var(--surface);font-size:13.5px;font-weight:600;border-radius:12px;
    padding:11px 14px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:14px;max-width:90vw;
    opacity:0;transform:translateY(12px);transition:.3s}
  :root[data-theme="dark"] .toast{background:#E8EDEF;color:#0F1316}
  .toast.show{opacity:1;transform:none}
  .toast-act{border:none;background:none;color:var(--glacier);font-weight:800;font-size:13.5px;cursor:pointer;font-family:inherit}
  :root[data-theme="dark"] .toast-act{color:#1d6f90}

  /* ---------- confetti ---------- */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:80;overflow:hidden}
  .confetti i{position:absolute;top:-12px;width:9px;height:15px;border-radius:2px;animation:fall 2.3s linear forwards}
  @keyframes fall{to{transform:translateY(108vh) rotate(720deg);opacity:.9}}

  /* ---------- modal ---------- */
  .modal{position:fixed;inset:0;background:rgba(10,15,18,.5);display:grid;place-items:end center;padding:0;z-index:90;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal[hidden]{display:none}
  .modal-card{background:var(--surface);border-radius:20px 20px 0 0;box-shadow:var(--shadow-lg);width:100%;max-width:480px;max-height:92vh;overflow:auto;padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:slideup .28s cubic-bezier(.2,.8,.3,1)}
  @media(min-width:520px){.modal{place-items:center;padding:18px}.modal-card{border-radius:20px}}
  @keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .modal-card h3{margin:0 0 4px;font-size:19px}
  .modal-card .sub{margin:0 0 16px;font-size:12.5px;color:var(--ink-soft)}
  .mfield{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .mfield > span{font-size:11px;font-weight:800;letter-spacing:.03em;color:var(--ink-soft);text-transform:uppercase}
  .mfield input,.mfield select{border:1px solid var(--line);border-radius:10px;padding:11px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface)}
  .mfield input:focus,.mfield select:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .mfield.row{flex-direction:row;gap:10px}
  .mfield.row label{flex:1;display:flex;flex-direction:column;gap:5px;font-size:11px;font-weight:800;letter-spacing:.03em;color:var(--ink-soft);text-transform:uppercase}
  .emoji-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .emoji-pick{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:19px;cursor:pointer}
  .emoji-pick.on{border-color:var(--glacier);background:var(--glacier-soft)}
  .mcheck{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink);padding:7px 0;cursor:pointer}
  .mcheck input{width:18px;height:18px;accent-color:var(--glacier)}
  .modal-actions{display:flex;align-items:center;gap:8px;margin-top:12px}
  .modal-actions .addbtn{padding:11px 18px}
  .grow{flex:1}

  .saving{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--ink);color:var(--surface);font-size:12px;padding:6px 13px;border-radius:99px;opacity:0;transition:.3s;pointer-events:none;z-index:65}

function withWarn(s){let t=esc(s);if(t.includes("⚠️"))t=t.replace(/(⚠️[^.]*\.)/,'<span class="warn">$1</span>');return t;}
function uid(){return "i"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);}
function val(id){return $(id).value;}
function L(){return APP.lists.find(l=>l.id===APP.currentId)||APP.lists[0]||null;}
function vibrate(ms){try{navigator.vibrate&&navigator.vibrate(ms);}catch(e){}}
function flashSaved(){const s=$("saving");s.classList.add("show");clearTimeout(flashSaved._t);flashSaved._t=setTimeout(()=>s.classList.remove("show"),800);}

// ---------- toast ----------
function toast(msg,actLabel,actFn,ms){
  const wrap=$("toastWrap");const t=document.createElement("div");t.className="toast";
  const sp=document.createElement("span");sp.textContent=msg;t.appendChild(sp);
  if(actLabel){const b=document.createElement("button");b.className="toast-act";b.textContent=actLabel;
    b.onclick=()=>{try{actFn&&actFn();}finally{hide();}};t.appendChild(b);}
  wrap.appendChild(t);requestAnimationFrame(()=>t.classList.add("show"));
  let done=false;function hide(){if(done)return;done=true;t.classList.remove("show");setTimeout(()=>t.remove(),320);}
  setTimeout(hide,ms||4000);
}
function fireConfetti(){
  const c=document.createElement("div");c.className="confetti";document.body.appendChild(c);
  const cols=["#2E6E8E","#3C8C6E","#C2774A","#B7892F","#7fb0c4","#E0966A"];
  for(let i=0;i<90;i++){const p=document.createElement("i");p.style.left=Math.random()*100+"vw";
    p.style.background=cols[i%cols.length];p.style.animationDelay=(Math.random()*0.35)+"s";
    p.style.transform="rotate("+(Math.random()*360)+"deg)";c.appendChild(p);}
  setTimeout(()=>c.remove(),2700);
}

// ---------- IndexedDB ----------
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open("checklist_db",1);
  r.onupgradeneeded=e=>{const db=e.target.result;
    if(!db.objectStoreNames.contains("lists"))db.createObjectStore("lists",{keyPath:"id"});
    if(!db.objectStoreNames.contains("meta"))db.createObjectStore("meta",{keyPath:"k"});};
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function idbAll(){return new Promise((res,rej)=>{const q=_db.transaction("lists","readonly").objectStore("lists").getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>rej(q.error);});}
function idbMeta(k){return new Promise(res=>{const q=_db.transaction("meta","readonly").objectStore("meta").get(k);q.onsuccess=()=>res(q.result?q.result.v:null);q.onerror=()=>res(null);});}
function idbPut(l){return new Promise((res,rej)=>{const q=_db.transaction("lists","readwrite").objectStore("lists").put(l);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});}
function idbDel(id){return new Promise((res,rej)=>{const q=_db.transaction("lists","readwrite").objectStore("lists").delete(id);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});}
function idbSetMeta(k,v){return new Promise((res,rej)=>{const q=_db.transaction("meta","readwrite").objectStore("meta").put({k,v});q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});}
function idbClear(){return new Promise((res,rej)=>{const q=_db.transaction("lists","readwrite").objectStore("lists").clear();q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});}

function newList(name,emoji,options,kind){

    DATA.forEach(d=>d.items.forEach(it=>items.push({id:uid(),cat:d.cat,name:it.name,type:it.type,ess:it.ess,note:it.note,cost:0,checked:false,order:items.length})));
  }else if(kind==="shopping"){catOrder=["식료품","생활용품","기타"];
    [["식료품","우유","buy"],["식료품","계란","buy"],["식료품","빵","buy"],["생활용품","휴지","buy"],["생활용품","세제","buy"]]
      .forEach(a=>items.push({id:uid(),cat:a[0],name:a[1],type:a[2],ess:false,note:"",cost:0,checked:false,order:items.length}));

const OLD_IDS=["d1","d2","d3","d4","d5","d6","e1","e2","e3","e4","e5","e6","c1","c2","c3","c4","c5","c6","c7",
  "w1","w2","w3","w4","w5","w6","w7","w8","w9","w10","s1","s2","s10","s3","s6","s7","s4","s8","s5",
  "h1","h2","h3","h4","h5","h6","m1","m2","m3","m4","m5","m6","m7","u1","u2","u3","u4","u5","u6"];
function buildHoneymoonList(){
  let old=null;try{const raw=localStorage.getItem("eutrip_checklist_v1");if(raw)old=JSON.parse(raw);}catch(e){}
  const deleted=new Set((old&&old.deleted)||[]),edits=(old&&old.edits)||{},costs=(old&&old.costs)||{},checked=(old&&old.checked)||{};
  const items=[];let order=0,k=0;const catOrder=DATA.map(d=>d.cat);
  DATA.forEach(d=>d.items.forEach(it=>{const oid=OLD_IDS[k++],ov=(old&&edits[oid])||{};
    if(old&&deleted.has(oid))return;const cat=ov.cat||d.cat;if(!catOrder.includes(cat))catOrder.push(cat);

      note:ov.note!==undefined?ov.note:it.note,cost:+costs[oid]||0,checked:!!checked[oid],order:order++});}));
  if(old&&Array.isArray(old.custom))old.custom.forEach(c=>{const ov=edits[c.id]||{};const cat=ov.cat||c.cat||"편의용품";
    if(!catOrder.includes(cat))catOrder.push(cat);
    items.push({id:uid(),cat,name:ov.name||c.name,type:ov.type||c.type||"buy",ess:ov.ess!==undefined?ov.ess:!!c.ess,
      note:ov.note!==undefined?ov.note:(c.note||""),cost:+costs[c.id]||0,checked:!!checked[c.id],order:order++});});
  return {id:"hm_"+uid(),name:"유럽 신혼여행 준비",emoji:"✈️",createdAt:Date.now(),order:0,

// ---------- 모델 ----------
function passFilter(it,f){switch(f){case"buy":return it.type==="buy";case"have":return it.type==="have";case"ess":return !!it.ess;case"left":return !it.checked;default:return true;}}
function matchQuery(it){if(!query)return true;const q=query.toLowerCase();return (it.name+" "+(it.note||"")).toLowerCase().includes(q);}
function sortItems(arr){const a=arr.slice();
  if(sortMode==="name")a.sort((x,y)=>x.name.localeCompare(y.name,"ko"));
  else if(sortMode==="todo")a.sort((x,y)=>(x.checked-y.checked)||((x.order||0)-(y.order||0)));
  else a.sort((x,y)=>(x.order||0)-(y.order||0));
  return a;}
function catsInOrder(list){const seen=new Set(list.catOrder),extra=[];list.items.forEach(it=>{if(!seen.has(it.cat)){seen.add(it.cat);extra.push(it.cat);}});return list.catOrder.concat(extra);}

// ---------- 렌더 ----------
const CHECK_SVG='<svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>';
function render(){
  const list=L();if(!list)return;
  $("listTitle").textContent=`${list.emoji||"📋"} ${list.name}`;
  $("spendCard").hidden=!list.options.spending;
  $("sortSelect").value=sortMode;
  setDday();refreshAddCats();
  const draggable=(sortMode==="manual"&&!query&&list.filter==="all");
  const byCat={};list.items.forEach(it=>{(byCat[it.cat]=byCat[it.cat]||[]).push(it);});
  const listEl=$("list");listEl.innerHTML="";let shown=0;
  catsInOrder(list).forEach((cat,i)=>{
    let items=(byCat[cat]||[]).filter(it=>passFilter(it,list.filter)&&matchQuery(it));
    if(!items.length)return;
    items=sortItems(items);shown+=items.length;
    const doneN=items.filter(it=>it.checked).length;
    const collapsed=!query&&!!list.collapsed[cat];
    const sec=document.createElement("div");sec.className="section"+(collapsed?" collapsed":"");
    sec.innerHTML=`<div class="sec-head" data-cat="${esc(cat)}">
      <span class="sec-num">${String(i+1).padStart(2,"0")}</span>
      <span class="sec-title">${esc(cat)}</span>
      <span class="sec-count">${doneN}/${items.length}</span>
      <span class="sec-rule"></span><span class="sec-chev">▾</span></div>`;
    if(!collapsed){
      const ul=document.createElement("ul");ul.dataset.cat=cat;
      items.forEach(it=>{
        const li=document.createElement("li");li.className="item"+(it.checked?" checked":"")+(it.id===justAddedId?" pop":"");li.dataset.id=it.id;
        const tag=it.type==="buy"?'<span class="tag buy">🛒 살 것</span>':'<span class="tag have">🎒 챙길 것</span>';
        const star=it.ess?'<span class="star" title="필수">⭐</span>':'';
        const price=(+it.cost>0)?`<span class="price" title="금액 수정">${won(it.cost)}</span>`:'';
        const note=it.note?`<div class="note">${withWarn(it.note)}</div>`:'';
        const drag=draggable?`<button class="del drag" data-drag title="순서 이동" aria-label="순서 이동">⠿</button>`:'';
        const acts=`<div class="item-actions">${drag}<button class="del edit" data-edit="${it.id}" title="수정" aria-label="수정">✎</button><button class="del" data-del="${it.id}" title="삭제" aria-label="삭제">×</button></div>`;
        li.innerHTML=`<span class="box">${CHECK_SVG}</span><div class="body"><div class="line1"><span class="name">${esc(it.name)}</span>${tag}${star}${price}</div>${note}</div>${acts}`;
        ul.appendChild(li);
      });
      sec.appendChild(ul);
    }
    listEl.appendChild(sec);
  });
  justAddedId=null;
  if(shown===0){
    listEl.innerHTML=query
      ? '<div class="empty"><span class="big">🔍</span>검색 결과가 없어요.</div>'
      : '<div class="empty"><span class="big">📝</span>아직 항목이 없어요.<br>위에서 추가하거나 ＋ 버튼을 눌러보세요.</div>';
  }
  updateProgress();updateSpend();
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c.dataset.f===list.filter));
}
function updateProgress(){
  const items=L().items,total=items.length,done=items.filter(it=>it.checked).length;
  const pct=total?Math.round(done/total*100):0;
  $("ring").style.setProperty("--p",pct);$("ringPct").textContent=pct+"%";
  $("m-total").textContent=total;$("m-done").textContent=done;
  $("m-buy").textContent=items.filter(it=>it.type==="buy"&&!it.checked).length;
  $("m-have").textContent=items.filter(it=>it.type==="have"&&!it.checked).length;
  $("plabel").textContent=total===0?"항목을 추가해 보세요":(pct===100?"전부 완료! 🎉":(done===0?"하나씩 체크해 보세요":`잘하고 있어요 — ${total-done}개 남음`));
  const id=L().id;
  if(pct===100&&total>0){ if(!celebrated.has(id)){celebrated.add(id);fireConfetti();vibrate([15,40,15,40,60]);toast("🎉 "+L().name+" 전부 완료!");} }
  else celebrated.delete(id);
}
function updateSpend(){
  const items=L().items;let spent=0,planned=0;const byCat={};
  items.forEach(it=>{const c=+it.cost||0;if(c<=0)return;if(it.checked)spent+=c;else planned+=c;byCat[it.cat]=(byCat[it.cat]||0)+c;});
  $("spendSpent").textContent=won(spent);$("spendPlanned").textContent=won(planned);$("spendTotal").textContent=won(spent+planned);
  const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);const tg=$("spendToggle"),br=$("spendBreak");
  tg.hidden=cats.length===0;
  if(cats.length===0){spendOpen=false;br.hidden=true;br.innerHTML="";return;}
  tg.textContent=spendOpen?"카테고리별 내역 ▴":"카테고리별 내역 ▾";br.hidden=!spendOpen;
  if(spendOpen){const max=cats[0][1]||1;br.innerHTML=cats.map(([c,a])=>`<div class="spend-row"><span class="scat">${esc(c)}</span><span class="samt">${won(a)}</span><span class="spend-bar"><i style="width:${Math.round(a/max*100)}%"></i></span></div>`).join("");}
}
function setDday(){
  const el=$("dday"),dd=L().options.dday;
  if(!dd||!dd.start){el.hidden=true;return;}el.hidden=false;
  const ms=864e5,p=s=>{const a=s.split("-").map(Number);return new Date(a[0],a[1]-1,a[2]);};
  const start=p(dd.start),end=dd.end?p(dd.end):start,n=new Date(),today=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  const dS=Math.round((start-today)/ms),dE=Math.round((end-today)/ms);let txt,s;
  if(dS>0){txt="📅 D-"+dS;s="soon";}else if(dS===0){txt="🎉 D-DAY · 오늘이에요!";s="go";}
  else if(dE>=0){txt="▶ 진행 중 · "+(-dS+1)+"일차";s="go";}else{txt="✅ 종료 · 수고했어요";s="done";}
  el.textContent=txt;el.dataset.s=s;
}

  lastDeleted=null;persistList(l);persistMeta();render();

// ---------- 드래그 정렬 ----------
let drag=null;
function onPointerDown(e){
  const h=e.target.closest("[data-drag]");if(!h)return;e.preventDefault();
  const li=h.closest("li.item"),ul=li.parentElement;if(!li||!ul)return;
  drag={li,ul,id:li.dataset.id};li.classList.add("dragging");
  document.addEventListener("pointermove",onPointerMove,{passive:false});
  document.addEventListener("pointerup",onPointerUp,{once:true});
}
function onPointerMove(e){
  if(!drag)return;e.preventDefault();
  drag.li.style.pointerEvents="none";
  const el=document.elementFromPoint(e.clientX,e.clientY);drag.li.style.pointerEvents="";
  if(!el)return;const over=el.closest("li.item");
  if(!over||over===drag.li||over.parentElement!==drag.ul)return;
  const r=over.getBoundingClientRect();const after=e.clientY>r.top+r.height/2;
  drag.ul.insertBefore(drag.li,after?over.nextSibling:over);
}
function onPointerUp(){
  document.removeEventListener("pointermove",onPointerMove);
  if(!drag)return;const d=drag;drag=null;d.li.classList.remove("dragging");d.li.style.pointerEvents="";
  // DOM 순서대로 order 재부여
  let o=0;document.querySelectorAll("#list li.item").forEach(li=>{const it=L().items.find(x=>x.id===li.dataset.id);if(it)it.order=o++;});
  vibrate(8);saveCur();
}

  EMOJIS.forEach(e=>{const b=document.createElement("button");b.type="button";b.className="emoji-pick"+(e===cur?" on":"");b.textContent=e;
    b.onclick=()=>{$("mEmoji").value=e;[...row.children].forEach(c=>c.classList.toggle("on",c.textContent===e));};row.appendChild(b);});}
function openNewList(){modalMode="new";$("modalTitle").textContent="새 리스트 만들기";$("modalSub").style.display="";
  $("mName").value="";$("mEmoji").value="📋";$("mTemplateWrap").hidden=false;$("mTemplate").value="blank";
  $("mSpending").checked=false;$("mDday").checked=false;$("mDdayRow").hidden=true;$("mStart").value="";$("mEnd").value="";
  $("mDelete").hidden=true;showModal(true);setTimeout(()=>$("mName").focus(),60);}
function openManageList(){const l=L();modalMode="edit";$("modalTitle").textContent="리스트 설정";$("modalSub").style.display="none";
  $("mName").value=l.name;$("mEmoji").value=l.emoji||"📋";$("mTemplateWrap").hidden=true;
  $("mSpending").checked=!!l.options.spending;const hasD=!!(l.options.dday&&l.options.dday.start);
  $("mDday").checked=hasD;$("mDdayRow").hidden=!hasD;$("mStart").value=hasD?l.options.dday.start:"";$("mEnd").value=hasD&&l.options.dday.end?l.options.dday.end:"";
  $("mDelete").hidden=APP.lists.length<=1;showModal(true);}
function modalSave(){
  const name=$("mName").value.trim();if(!name){alert("리스트 이름을 입력해 주세요.");return;}
  const emoji=$("mEmoji").value.trim()||"📋",spending=$("mSpending").checked,useD=$("mDday").checked;
  const start=$("mStart").value,end=$("mEnd").value;const dday=(useD&&start)?{start,end:end||""}:null;const options={dday,spending};
  if(modalMode==="new"){const l=newList(name,emoji,options,$("mTemplate").value);APP.lists.push(l);APP.currentId=l.id;celebrated.delete(l.id);persistList(l);persistMeta();toast("‘"+name+"’ 리스트를 만들었어요");}
  else{const l=L();l.name=name;l.emoji=emoji;l.options=options;persistList(l);persistMeta();}
  showModal(false);spendOpen=false;buildListSelect();render();
}
function modalDelete(){
  if(APP.lists.length<=1){alert("마지막 리스트는 삭제할 수 없어요.");return;}
  const l=L();if(!confirm(`‘${l.name}’ 리스트를 삭제할까요? 되돌릴 수 없습니다.`))return;
  APP.lists=APP.lists.filter(x=>x.id!==l.id);if(idbOK)idbDel(l.id).catch(()=>{});
  APP.currentId=APP.lists[0].id;persistMeta();if(!idbOK)fallbackSaveAll();
  showModal(false);spendOpen=false;buildListSelect();render();
}

// ---------- 테마 ----------
function applyTheme(){const t=localStorage.getItem("ck_theme")||"auto";
  const dark=t==="dark"||(t==="auto"&&matchMedia("(prefers-color-scheme:dark)").matches);
  document.documentElement.dataset.theme=dark?"dark":"light";
  const b=$("themeBtn");if(b)b.textContent=dark?"☀️":"🌙";}

// ---------- 이벤트 ----------
$("list").addEventListener("pointerdown",onPointerDown);
$("list").addEventListener("click",e=>{
  if(!L())return;
  if(e.target.closest("[data-drag]"))return;
  const head=e.target.closest(".sec-head");
  if(head){const cat=head.dataset.cat,c=L().collapsed;c[cat]=!c[cat];saveCur();render();return;}
  if(e.target.closest(".edit-form")){const sv=e.target.closest("[data-savedit]");if(sv)saveEdit(sv.dataset.savedit);else if(e.target.closest("[data-canceledit]"))render();return;}
  const ed=e.target.closest("[data-edit]");if(ed){openEdit(ed.dataset.edit);return;}
  const pr=e.target.closest(".price");if(pr){const row=pr.closest("li.item");if(row)openEdit(row.dataset.id);return;}
  const del=e.target.closest("[data-del]");if(del){deleteItem(del.dataset.del);return;}
  const li=e.target.closest("li.item");if(!li||li.classList.contains("editing")||li.classList.contains("removing"))return;
  const it=L().items.find(x=>x.id===li.dataset.id);if(!it)return;
  it.checked=!it.checked;vibrate(it.checked?12:6);
  li.classList.toggle("checked",it.checked);
  if(L().filter==="left"||sortMode==="todo"){ saveCur();render(); }   // 위치가 바뀌어야 하는 경우만 전체 갱신
  else { recountSections();updateProgress();updateSpend();saveCur(); } // 그 외엔 제자리 갱신(애니메이션 반복 방지)
});
function recountSections(){
  const list=L();const byCat={};list.items.forEach(it=>{(byCat[it.cat]=byCat[it.cat]||[]).push(it);});
  document.querySelectorAll("#list .section").forEach(sec=>{
    const head=sec.querySelector(".sec-head");if(!head)return;const cat=head.dataset.cat;
    const items=(byCat[cat]||[]).filter(it=>passFilter(it,list.filter)&&matchQuery(it));
    const cnt=sec.querySelector(".sec-count");if(cnt)cnt.textContent=items.filter(it=>it.checked).length+"/"+items.length;
  });
}
$("filters").addEventListener("click",e=>{const b=e.target.closest(".chip");if(!b||!L())return;L().filter=b.dataset.f;saveCur();render();});
$("searchInput").addEventListener("input",e=>{query=e.target.value.trim();render();});
$("sortSelect").addEventListener("change",e=>{sortMode=e.target.value;localStorage.setItem("ck_sort",sortMode);render();});
$("toggleAll").addEventListener("click",()=>{if(!L())return;const cats=catsInOrder(L());const open=cats.some(c=>!L().collapsed[c]);cats.forEach(c=>L().collapsed[c]=open);saveCur();render();});
$("spendToggle").addEventListener("click",()=>{spendOpen=!spendOpen;updateSpend();});
$("addBtn").addEventListener("click",addItem);
$("newName").addEventListener("keydown",e=>{if(e.key==="Enter")addItem();});
$("newCost").addEventListener("keydown",e=>{if(e.key==="Enter")addItem();});
$("resetBtn").addEventListener("click",()=>{if(!L())return;if(confirm("이 리스트의 체크를 전부 해제할까요?")){L().items.forEach(it=>it.checked=false);celebrated.delete(L().id);saveCur();render();}});
$("fab").addEventListener("click",()=>{window.scrollTo({top:0,behavior:"smooth"});setTimeout(()=>$("newName").focus(),300);});
$("themeBtn").addEventListener("click",()=>{const cur=document.documentElement.dataset.theme;localStorage.setItem("ck_theme",cur==="dark"?"light":"dark");applyTheme();});
$("listSelect").addEventListener("change",e=>{APP.currentId=e.target.value;persistMeta();spendOpen=false;query="";$("searchInput").value="";render();});
$("newListBtn").addEventListener("click",openNewList);
$("manageListBtn").addEventListener("click",openManageList);
$("mCancel").addEventListener("click",()=>showModal(false));
$("mSave").addEventListener("click",modalSave);
$("mDelete").addEventListener("click",modalDelete);
$("mEmoji").addEventListener("input",buildEmojiRow);
$("mDday").addEventListener("change",e=>{$("mDdayRow").hidden=!e.target.checked;});
$("modal").addEventListener("click",e=>{if(e.target.id==="modal")showModal(false);});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&!$("modal").hidden)showModal(false);});
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredInstall=e;$("installBtn").hidden=false;});
$("installBtn").addEventListener("click",async()=>{if(!deferredInstall)return;deferredInstall.prompt();await deferredInstall.userChoice;deferredInstall=null;$("installBtn").hidden=true;});

// 백업/복원
$("exportBtn").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify({version:2,lists:APP.lists,currentId:APP.currentId},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  const d=new Date(),pad=n=>String(n).padStart(2,"0");
  a.download=`checklist-backup-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast("백업 파일을 저장했어요");
});
$("importBtn").addEventListener("click",()=>$("importFile").click());
$("importFile").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=async()=>{try{const v=JSON.parse(r.result);const lists=Array.isArray(v.lists)?v.lists:(Array.isArray(v)?v:null);
    if(!lists||!lists.length)throw 0;
    if(!confirm("백업을 불러오면 현재 모든 리스트가 교체됩니다. 진행할까요?")){e.target.value="";return;}
    APP.lists=lists;APP.currentId=(v.currentId&&lists.some(l=>l.id===v.currentId))?v.currentId:lists[0].id;
    if(idbOK){await idbClear();for(const l of APP.lists){try{await idbPut(l);}catch(_){}}await idbSetMeta("currentId",APP.currentId);}else fallbackSaveAll();
    buildListSelect();render();toast("복원 완료!");
  }catch(err){alert("파일을 읽을 수 없어요. 이 앱에서 내보낸 백업 JSON인지 확인해 주세요.");}e.target.value="";};
  r.readAsText(f);
});
matchMedia("(prefers-color-scheme:dark)").addEventListener("change",applyTheme);
function registerSW(){if("serviceWorker" in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}

// ---------- init ----------
(async function init(){
  applyTheme();sortMode=localStorage.getItem("ck_sort")||"manual";
  try{_db=await openDB();idbOK=true;}catch(e){idbOK=false;}
  let lists=[],curId=null;
  if(idbOK){try{lists=await idbAll();curId=await idbMeta("currentId");}catch(e){idbOK=false;}}
  if(!idbOK){try{const raw=localStorage.getItem(APP_KEY);if(raw){const a=JSON.parse(raw);lists=a.lists||[];curId=a.currentId;}}catch(e){}}
  if(!lists.length){const hm=buildHoneymoonList();lists=[hm];curId=hm.id;}
  APP.lists=lists.sort((a,b)=>(a.order||0)-(b.order||0));
  APP.currentId=(curId&&APP.lists.some(l=>l.id===curId))?curId:APP.lists[0].id;
  if(idbOK){for(const l of APP.lists){try{await idbPut(l);}catch(e){}}try{await idbSetMeta("currentId",APP.currentId);}catch(e){}}else fallbackSaveAll();
  buildListSelect();render();registerSW();
})();
</script>
