<!-- Europe honeymoon packing checklist — Paris · Interlaken · Zurich · Rome, late June–early July 2026 -->

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>유럽 여행 준비 체크리스트</title>

<!-- PWA: 홈 화면에 추가하면 앱처럼 실행 -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2E6E8E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="유럽 체크리스트">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#FBFAF7;
    --ink:#1B2A30;
    --ink-soft:#5A6A6F;
    --line:#E6E1D7;
    --glacier:#2E6E8E;   /* 알프스 빙하 */
    --glacier-soft:#E5F0F4;
    --sand:#C2774A;      /* 로마 햇볕/돌 */
    --sand-soft:#F6EAE0;
    --gold:#B7892F;
    --done:#3C8C6E;
    --done-soft:#E4F1EA;
    --shadow:0 1px 2px rgba(27,42,48,.05), 0 8px 24px rgba(27,42,48,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Pretendard",system-ui,sans-serif;
    line-height:1.55;letter-spacing:-.01em;
  }
  .wrap{max-width:820px;margin:0 auto;padding:28px 18px 80px}

  /* ---------- header / boarding tag ---------- */
  header{
    background:#fff;border:1px solid var(--line);border-radius:18px;
    overflow:hidden;box-shadow:var(--shadow);margin-bottom:18px;
  }
  .climate-strip{height:6px;background:linear-gradient(90deg,var(--glacier) 0%,#7fb0c4 38%,#e7c98f 62%,var(--sand) 100%)}
  .head-body{padding:22px 22px 20px}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--glacier);font-weight:700;margin-bottom:6px}
  h1{
    font-family:"Fraunces",serif;font-weight:600;font-size:30px;line-height:1.1;
    margin:0 0 4px;letter-spacing:-.015em;
  }
  h1 .kr{font-family:"Pretendard",sans-serif;font-weight:700;font-size:25px;display:block;margin-top:2px}
  .route{color:var(--ink-soft);font-size:14px;margin-top:8px}
  .route b{color:var(--ink);font-weight:600}

  /* ---------- progress ---------- */
  .progress-card{margin-top:18px;padding:16px;border:1px dashed var(--line);border-radius:14px;background:var(--paper)}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .progress-top .pct{font-family:"Fraunces",serif;font-size:24px;font-weight:600;color:var(--ink)}
  .progress-top .label{font-size:13px;color:var(--ink-soft)}
  .bar{height:10px;border-radius:99px;background:#ECE7DC;margin-top:10px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--glacier),var(--done));transition:width .5s cubic-bezier(.4,0,.2,1)}
  .mini-stats{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
  .mini{font-size:13px;color:var(--ink-soft)}
  .mini b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
  .mini .buy{color:var(--sand)}

  /* ---------- filter bar ---------- */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 10px;position:sticky;top:0;z-index:5;
    background:linear-gradient(var(--paper) 70%,rgba(251,250,247,0));padding:8px 0}
  .chip{
    border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    padding:7px 13px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;
    font-family:inherit;transition:.15s;
  }
  .chip:hover{border-color:var(--glacier);color:var(--glacier)}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

  /* ---------- sections ---------- */
  .section{margin-top:22px}
  .sec-head{display:flex;align-items:center;gap:10px;margin:0 2px 10px}
  .sec-num{font-family:"Fraunces",serif;font-size:13px;color:var(--sand);font-weight:600;min-width:22px}
  .sec-title{font-size:16px;font-weight:700}
  .sec-count{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .sec-rule{flex:1;height:1px;background:var(--line)}

  ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  li.item{
    display:flex;gap:12px;align-items:flex-start;
    background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 14px;
    box-shadow:var(--shadow);transition:.18s;cursor:pointer;
  }
  li.item:hover{border-color:#d3ccbe}
  li.item.checked{background:var(--done-soft);border-color:#cfe6db}
  li.item.checked .name{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:#9bc7b4}

  .box{
    flex:none;width:22px;height:22px;border-radius:7px;border:2px solid #cfc7b7;background:#fff;
    margin-top:1px;display:grid;place-items:center;transition:.18s;
  }
  .box svg{width:13px;height:13px;stroke:#fff;stroke-width:3.4;fill:none;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:20;stroke-dashoffset:20;transition:stroke-dashoffset .25s ease}
  li.item.checked .box{background:var(--done);border-color:var(--done)}
  li.item.checked .box svg{stroke-dashoffset:0}

  .body{flex:1;min-width:0}
  .line1{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .name{font-size:15px;font-weight:600}
  .tag{font-size:10.5px;font-weight:800;letter-spacing:.02em;padding:2px 7px;border-radius:6px;white-space:nowrap}
  .tag.buy{background:var(--sand-soft);color:#9c5a30}
  .tag.have{background:var(--glacier-soft);color:#256079}
  .star{color:var(--gold);font-size:12px;font-weight:800}
  .note{font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.45}
  .note .warn{color:#b4502a;font-weight:600}
  .del{flex:none;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:#fff;
    color:var(--ink-soft);font-size:20px;line-height:1;cursor:pointer;padding:0;display:grid;place-items:center;transition:.15s}
  .del:hover{border-color:var(--sand);color:var(--sand);background:var(--sand-soft)}
  .del:active{transform:scale(.92)}

  /* ---------- add row ---------- */
  .add{margin-top:26px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .add h3{margin:0 0 10px;font-size:14px;font-weight:700}
  .add-row{display:flex;gap:8px;flex-wrap:wrap}
  .add input[type=text]{flex:1;min-width:160px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:14px;color:var(--ink)}
  .add input:focus,.add select:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .add select{border:1px solid var(--line);border-radius:9px;padding:9px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff}
  .add button.addbtn{border:none;background:var(--ink);color:#fff;border-radius:9px;padding:9px 16px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
  .add button.addbtn:hover{background:var(--glacier)}

  /* ---------- footer actions ---------- */
  .foot{margin-top:24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .foot small{color:var(--ink-soft);font-size:12px;flex:1;min-width:200px}
  .foot-btns{display:flex;gap:8px;flex-wrap:wrap}
  .reset{border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:9px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .reset:hover{border-color:var(--sand);color:var(--sand)}
  .empty{text-align:center;color:var(--ink-soft);font-size:14px;padding:30px 0}
  .saving{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12px;padding:7px 14px;border-radius:99px;opacity:0;transition:.3s;pointer-events:none}
  .saving.show{opacity:.92}

  /* ---------- d-day ---------- */
  .dday{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:13px;font-weight:700;
    padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--ink);font-variant-numeric:tabular-nums}
  .dday[data-s="soon"]{background:var(--glacier-soft);border-color:#bfe0ec;color:#1d5e78}
  .dday[data-s="go"]{background:var(--done-soft);border-color:#cfe6db;color:#27795c}
  .dday[data-s="done"]{background:var(--sand-soft);border-color:#ecd8c8;color:#9c5a30}

  /* ---------- list bar / collapse ---------- */
  .listbar{display:flex;justify-content:flex-end;margin:8px 2px 0}
  .linkbtn{border:none;background:none;color:var(--glacier);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;padding:4px 6px}
  .linkbtn:hover{text-decoration:underline}
  .sec-head{cursor:pointer;user-select:none}
  .sec-chev{color:var(--ink-soft);font-size:12px;transition:transform .2s;margin-left:2px}
  .section.collapsed .sec-chev{transform:rotate(-90deg)}

  /* ---------- item actions / edit ---------- */
  .item-actions{display:flex;gap:6px;align-self:center}
  .del.edit{font-size:17px}
  .del.edit:hover{border-color:var(--glacier);color:var(--glacier);background:var(--glacier-soft)}
  li.item.editing{cursor:default;display:block;border-color:var(--glacier);box-shadow:0 0 0 3px var(--glacier-soft)}
  .edit-form{display:flex;flex-direction:column;gap:10px;width:100%}
  .edit-form .ef-label{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:-4px}
  .edit-name{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink)}
  .edit-note{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13px;line-height:1.45;color:var(--ink);resize:vertical}
  .edit-name:focus,.edit-note:focus,.edit-cat:focus,.edit-type:focus{outline:2px solid var(--glacier-soft);border-color:var(--glacier)}
  .edit-opts{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .edit-opts .field{display:flex;flex-direction:column;gap:3px}
  .edit-opts .field > span{font-size:10.5px;font-weight:800;letter-spacing:.03em;color:var(--ink-soft);text-transform:uppercase}
  .edit-cat,.edit-type{border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff}
  .edit-ess-wrap{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;align-self:flex-end;user-select:none}
  .edit-ess-wrap.on{background:#FBF3DD;border-color:var(--gold);color:#8a6a1f}
  .edit-ess{width:17px;height:17px;accent-color:var(--gold);margin:0}
  .edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
  .edit-actions .addbtn{padding:8px 18px}
  .edit-actions .reset{padding:8px 14px}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="wrap">
  <header>
    <div class="climate-strip"></div>
    <div class="head-body">
      <div class="eyebrow">Honeymoon · 14 days</div>
      <h1>Alps & Mediterranean<span class="kr">유럽 신혼여행 준비 체크리스트</span></h1>
      <div class="route"><b>파리</b> → <b>인터라켄</b> → <b>취리히</b> → <b>로마</b> · 2026년 6월 말–7월 초</div>
      <span class="dday" id="dday"></span>
      <div class="progress-card">
        <div class="progress-top">
          <span class="pct" id="pct">0%</span>
          <span class="label" id="plabel">하나씩 체크해 보세요</span>
        </div>
        <div class="bar"><i id="barfill"></i></div>
        <div class="mini-stats">
          <span class="mini">전체 <b id="m-total">0</b>개 중 <b id="m-done">0</b>개 완료</span>
          <span class="mini buy">🛒 살 것 남음 <b id="m-buy">0</b>개</span>
          <span class="mini">🎒 챙길 것 남음 <b id="m-have">0</b>개</span>
        </div>
      </div>
    </div>
  </header>

  <div class="add">
    <h3>내 항목 추가</h3>
    <div class="add-row">
      <input type="text" id="newName" placeholder="예: 변환 젠더, 슬리퍼, 여권 케이스…" maxlength="60">
      <select id="newCat"></select>
      <select id="newType">
        <option value="buy">🛒 살 것</option>
        <option value="have">🎒 챙길 것</option>
      </select>
      <button class="addbtn" id="addBtn">추가</button>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="chip on" data-f="all">전체</button>
    <button class="chip" data-f="buy">🛒 살 것</button>
    <button class="chip" data-f="have">🎒 챙길 것</button>
    <button class="chip" data-f="ess">⭐ 필수만</button>
    <button class="chip" data-f="left">남은 것만</button>
  </div>

  <div class="listbar"><button class="linkbtn" id="toggleAll">⌃ 전체 접기 / 펼치기</button></div>
  <div id="list"></div>

  <div class="foot">
    <small>⭐ = 필수 · 🛒 출발 전 구매 권장 · 🎒 집에서 챙기기 · 체크 상태는 이 기기에 자동 저장됩니다</small>
    <div class="foot-btns">
      <button class="reset" id="exportBtn">백업 내보내기</button>
      <button class="reset" id="importBtn">복원</button>
      <button class="reset" id="restoreDelBtn" hidden>삭제 복원</button>
      <button class="reset" id="resetBtn">체크 전체 해제</button>
    </div>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>
</div>

<div class="saving" id="saving">저장됨</div>

<script>
const STORE_KEY = "eutrip_checklist_v1";

// type: buy=출발 전 구매 권장 / have=집에서 챙기기 ·  ess: 필수 여부
const DATA = [
  { cat:"서류 · 금융", items:[
    {id:"d1", name:"여권", type:"have", ess:true, note:"잔여 유효기간 6개월 이상 확인. ETIAS는 2026년 4분기 도입 예정이라 7월 여행엔 불필요 — 무비자 90일."},
    {id:"d2", name:"여권 사본 + 여권용 사진 2매", type:"have", ess:true, note:"분실·재발급 대비. 사진·사본은 클라우드에도 백업."},
    {id:"d3", name:"항공권·숙소·기차표·입장권 예약확인서", type:"have", ess:true, note:"콜로세움·바티칸·융프라우 등 사전예약 티켓 포함. 캡처해서 오프라인 저장."},
    {id:"d4", name:"해외결제 카드 2장 (VISA/Master)", type:"have", ess:true, note:"한 장은 따로 분리 보관. 결제 시 현지통화(EUR/CHF) 선택해 DCC 수수료 피하기."},
    {id:"d5", name:"비상금 현금 (유로 + 소액 스위스프랑)", type:"buy", ess:true, note:"⚠️ 스위스는 EUR이 아닌 CHF 별도 통화. 카드가 잘 되니 현금은 소액만."},
    {id:"d6", name:"여행자보험 가입", type:"buy", ess:true, note:"의료비·휴대품 도난 보장 확인. 증권 캡처해 두기."},
  ]},
  { cat:"통신 · 전자기기", items:[
    {id:"e1", name:"유럽 eSIM / 유심 (3개국 커버)", type:"buy", ess:true, note:"프랑스·스위스·이탈리아 모두 포함되는 플랜으로. 출발 전 설치하고 현지 도착 후 활성화만."},
    {id:"e2", name:"유니버설 멀티 어댑터", type:"buy", ess:true, note:"⚠️ 스위스 콘센트(Type J)는 프랑스·이탈리아(C/E)와 달라요. 둘 다 되는 멀티형 1개로 통일."},
    {id:"e3", name:"고속 멀티 USB 충전기", type:"have", ess:true, note:"포트 여러 개짜리. 어댑터 1개에 꽂아 폰·카메라·보조배터리 동시 충전."},
    {id:"e4", name:"보조배터리 (대용량)", type:"have", ess:true, note:"위탁수하물 금지 — 반드시 기내 휴대. 100Wh 이하만 반입 가능."},
    {id:"e5", name:"충전 케이블 여분", type:"have", ess:false, note:"잘 끊기고 잃어버리기 쉬움. 1~2개 여유."},
    {id:"e6", name:"미니 멀티탭", type:"buy", ess:false, note:"호텔 콘센트가 적을 때 유용. 어댑터 1개로 여러 기기 충전."},
  ]},
  { cat:"카메라 (Nikon Z50 II)", items:[

    {id:"c4", name:"카메라 충전기 / USB-C 케이블", type:"have", ess:true, note:"Z50 II는 USB 충전도 가능 — 케이블 챙기면 편함."},
    {id:"c5", name:"렌즈 클리닝 키트 (천·블로워)", type:"buy", ess:false, note:"알프스 먼지·물방울 대비."},
    {id:"c6", name:"편한 카메라 스트랩", type:"have", ess:false, note:"하루종일 들면 목·어깨 부담. 넥/핸드 스트랩."},
    {id:"c7", name:"24mm f/1.7 단렌즈", type:"buy", ess:false, note:"선택. 야경·실내·인물 스냅에 강함. 신혼 인생샷용."},
  ]},
  { cat:"의류 (더위 + 알프스 동시 대비)", items:[

const CAT_LIST = DATA.map(d=>d.cat);
let state = { checked:{}, custom:[], deleted:[], edits:{}, collapsed:{}, filter:"all" };

// ---------- storage (localStorage: 폰·브라우저에 그대로 저장) ----------
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const v = JSON.parse(raw); state = {checked:v.checked||{}, custom:v.custom||[], deleted:v.deleted||[], edits:v.edits||{}, collapsed:v.collapsed||{}, filter:v.filter||"all"}; }
  }catch(e){ /* 첫 실행 */ }
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); flashSaved(); }
  catch(e){ console.error("save failed", e); }
}
function flashSaved(){ const s=document.getElementById("saving"); s.classList.add("show"); setTimeout(()=>s.classList.remove("show"),900); }

// ---------- model helpers ----------
function allItems(){
  const del = new Set(state.deleted);
  const base = DATA.flatMap(d=>d.items.map(it=>({...it, cat:d.cat}))).filter(it=>!del.has(it.id));
  return base.concat(state.custom).map(it=>{
    const ov = state.edits[it.id];
    return ov ? {...it, ...ov} : it;   // 이름·메모 사용자 수정 반영
  });
}
function itemsByCat(){
  const map={}; CAT_LIST.forEach(c=>map[c]=[]);
  allItems().forEach(it=>{ if(!map[it.cat]) map[it.cat]=[]; map[it.cat].push(it); });
  return map;
}
function passFilter(it){
  const done=!!state.checked[it.id];
  switch(state.filter){
    case "buy": return it.type==="buy";
    case "have": return it.type==="have";
    case "ess": return !!it.ess;
    case "left": return !done;
    default: return true;
  }
}

// ---------- render ----------
const CHECK_SVG='<svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>';
function render(){
  const map=itemsByCat();
  const list=document.getElementById("list");
  list.innerHTML="";
  let shown=0;
  CAT_LIST.concat(Object.keys(map).filter(c=>!CAT_LIST.includes(c))).forEach((cat,i)=>{
    const items=(map[cat]||[]).filter(passFilter);
    if(items.length===0) return;
    shown+=items.length;
    const doneN=items.filter(it=>state.checked[it.id]).length;
    const collapsed=!!state.collapsed[cat];
    const sec=document.createElement("div"); sec.className="section"+(collapsed?" collapsed":"");
    sec.innerHTML=`<div class="sec-head" data-cat="${esc(cat)}">
        <span class="sec-num">${String(i+1).padStart(2,"0")}</span>
        <span class="sec-title">${esc(cat)}</span>
        <span class="sec-count">${doneN}/${items.length}</span>
        <span class="sec-rule"></span>
        <span class="sec-chev">▾</span>
      </div>`;
    if(!collapsed){
      const ul=document.createElement("ul");
      items.forEach(it=>{
        const done=!!state.checked[it.id];
        const li=document.createElement("li");
        li.className="item"+(done?" checked":"");
        li.dataset.id=it.id;
        const tag = it.type==="buy"
          ? '<span class="tag buy">🛒 살 것</span>'
          : '<span class="tag have">🎒 챙길 것</span>';
        const star = it.ess ? '<span class="star" title="필수">⭐</span>' : '';
        const note = it.note ? `<div class="note">${withWarn(it.note)}</div>` : '';
        const actions = `<div class="item-actions">`
          + `<button class="del edit" title="수정" data-edit="${it.id}" aria-label="수정">✎</button>`
          + `<button class="del" title="삭제" data-del="${it.id}" aria-label="삭제">×</button>`
          + `</div>`;
        li.innerHTML=`<span class="box">${CHECK_SVG}</span>
          <div class="body">
            <div class="line1"><span class="name">${esc(it.name)}</span>${tag}${star}</div>
            ${note}
          </div>${actions}`;
        ul.appendChild(li);
      });
      sec.appendChild(ul);
    }
    list.appendChild(sec);
  });
  if(shown===0){ list.innerHTML='<div class="empty">조건에 맞는 항목이 없어요. 필터를 바꿔보세요.</div>'; }
  updateProgress();
  updateRestoreBtn();
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on", c.dataset.f===state.filter));
}

function updateProgress(){
  const items=allItems();
  const total=items.length;
  const done=items.filter(it=>state.checked[it.id]).length;
  const pct= total? Math.round(done/total*100):0;
  document.getElementById("pct").textContent=pct+"%";
  document.getElementById("barfill").style.width=pct+"%";
  document.getElementById("m-total").textContent=total;
  document.getElementById("m-done").textContent=done;
  document.getElementById("m-buy").textContent=items.filter(it=>it.type==="buy"&&!state.checked[it.id]).length;
  document.getElementById("m-have").textContent=items.filter(it=>it.type==="have"&&!state.checked[it.id]).length;
  const lbl=document.getElementById("plabel");
  lbl.textContent = pct===100 ? "준비 완료! 즐거운 여행 되세요 ✈️" : (pct===0? "하나씩 체크해 보세요" : `잘하고 있어요 — ${total-done}개 남음`);
}

// ---------- utils ----------
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function withWarn(s){ // keep ⚠️/🏔️ lines emphasized
  let t=esc(s);
  if(t.includes("⚠️")) t=t.replace(/(⚠️[^.]*\.)/,'<span class="warn">$1</span>');
  return t;
}

// ---------- events ----------
document.getElementById("list").addEventListener("click",e=>{
  // 카테고리 접기/펼치기
  const head=e.target.closest(".sec-head");
  if(head){ const cat=head.dataset.cat; state.collapsed[cat]=!state.collapsed[cat]; save(); render(); return; }
  // 편집 폼 내부 클릭(저장/취소/입력) — 체크 토글 막음
  if(e.target.closest(".edit-form")){
    if(e.target.closest("[data-savedit]")) saveEdit(e.target.closest("[data-savedit]").dataset.savedit);
    else if(e.target.closest("[data-canceledit]")) render();
    return;
  }
  // 수정 버튼
  const ed=e.target.closest("[data-edit]");
  if(ed){ openEdit(ed.dataset.edit); return; }
  // 삭제 버튼
  const del=e.target.closest("[data-del]");
  if(del){
    const id=del.dataset.del;
    const isCustom=state.custom.some(c=>c.id===id);
    const it=allItems().find(x=>x.id===id);
    const nm=it?it.name:"이 항목";
    if(!confirm(`'${nm}'을(를) 삭제할까요?`+(isCustom?"":"\n(기본 항목은 '삭제 복원'으로 되살릴 수 있어요)"))) return;
    if(isCustom){ state.custom=state.custom.filter(c=>c.id!==id); }
    else if(!state.deleted.includes(id)){ state.deleted.push(id); }
    delete state.checked[id]; delete state.edits[id]; save(); render(); return;
  }
  const li=e.target.closest("li.item"); if(!li||li.classList.contains("editing")) return;
  const id=li.dataset.id;
  if(state.checked[id]) delete state.checked[id]; else state.checked[id]=true;
  // update just this li for snappiness, then progress
  li.classList.toggle("checked", !!state.checked[id]);
  // re-render if a filter would hide/show it
  if(state.filter==="left"){ render(); } else { updateProgress(); refreshCounts(); }
  save();
});
function refreshCounts(){ render(); } // simplest: counts in headers need recompute

document.getElementById("filters").addEventListener("click",e=>{
  const b=e.target.closest(".chip"); if(!b) return;
  state.filter=b.dataset.f; save(); render();
});

document.getElementById("addBtn").addEventListener("click",addItem);
document.getElementById("newName").addEventListener("keydown",e=>{ if(e.key==="Enter") addItem(); });
function addItem(){
  const name=document.getElementById("newName").value.trim();
  if(!name) return;
  const cat=document.getElementById("newCat").value;
  const type=document.getElementById("newType").value;
  const id="x"+Date.now().toString(36)+Math.floor(Math.random()*1000);
  state.custom.push({id,name,cat,type,custom:true,ess:false,note:""});
  document.getElementById("newName").value="";
  save(); render();
}

document.getElementById("resetBtn").addEventListener("click",()=>{
  if(confirm("체크를 전부 해제할까요? (추가한 항목은 그대로 유지됩니다)")){
    state.checked={}; save(); render();
  }
});

document.getElementById("restoreDelBtn").addEventListener("click",()=>{
  const n=state.deleted.length;
  if(n && confirm(`삭제한 기본 항목 ${n}개를 모두 되살릴까요?`)){
    state.deleted=[]; save(); render();
  }
});
function updateRestoreBtn(){
  const b=document.getElementById("restoreDelBtn");
  if(!b) return;
  const n=state.deleted.length;
  b.hidden = n===0;
  b.textContent = `삭제 복원 (${n})`;
}

// ---------- 항목 인라인 수정 ----------
function openEdit(id){
  const it=allItems().find(x=>x.id===id); if(!it) return;
  const li=document.querySelector(`li.item[data-id="${id}"]`); if(!li) return;
  const catOpts=CAT_LIST.map(c=>`<option value="${esc(c)}"${c===it.cat?" selected":""}>${esc(c)}</option>`).join("");
  li.classList.add("editing");
  li.innerHTML=`<div class="edit-form">
      <div class="ef-label">항목 이름</div>
      <input class="edit-name" type="text" maxlength="80" value="${esc(it.name)}" placeholder="항목 이름">
      <div class="ef-label">메모</div>
      <textarea class="edit-note" rows="3" maxlength="400" placeholder="메모 (선택)">${esc(it.note||"")}</textarea>
      <div class="edit-opts">
        <label class="field"><span>분류</span>
          <select class="edit-cat">${catOpts}</select>
        </label>
        <label class="field"><span>유형</span>
          <select class="edit-type">
            <option value="buy"${it.type==="buy"?" selected":""}>🛒 살 것</option>
            <option value="have"${it.type==="have"?" selected":""}>🎒 챙길 것</option>
          </select>
        </label>
        <label class="edit-ess-wrap${it.ess?" on":""}">
          <input class="edit-ess" type="checkbox"${it.ess?" checked":""}> ⭐ 필수
        </label>
      </div>
      <div class="edit-actions">
        <button class="reset" data-canceledit="1">취소</button>
        <button class="addbtn" data-savedit="${id}">저장</button>
      </div>
    </div>`;
  const nm=li.querySelector(".edit-name");
  nm.focus(); nm.setSelectionRange(nm.value.length, nm.value.length);
  // ⭐ 필수 토글 시각 피드백
  const essBox=li.querySelector(".edit-ess");
  essBox.addEventListener("change",()=>li.querySelector(".edit-ess-wrap").classList.toggle("on", essBox.checked));
}
function saveEdit(id){
  const li=document.querySelector(`li.item[data-id="${id}"]`); if(!li) return;
  const name=li.querySelector(".edit-name").value.trim();
  if(!name){ alert("이름을 입력해 주세요."); return; }
  const note=li.querySelector(".edit-note").value.trim();
  const type=li.querySelector(".edit-type").value;
  const cat=li.querySelector(".edit-cat").value;
  const ess=li.querySelector(".edit-ess").checked;
  state.edits[id]={name, note, type, cat, ess};
  save(); render();
}

// ---------- 전체 접기/펼치기 ----------
document.getElementById("toggleAll").addEventListener("click",()=>{
  const cats=Object.keys(itemsByCat());
  const anyOpen=cats.some(c=>!state.collapsed[c]);
  cats.forEach(c=>{ state.collapsed[c]=anyOpen; });  // 하나라도 열려 있으면 전부 접기
  save(); render();
});

// ---------- D-day ----------
function setDday(){
  const el=document.getElementById("dday"); if(!el) return;
  const ms=864e5;
  const start=new Date(2026,5,21), end=new Date(2026,6,4);  // 6/21 ~ 7/4
  const n=new Date(); const today=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  const dStart=Math.round((start-today)/ms), dEnd=Math.round((end-today)/ms);
  let txt,s;
  if(dStart>0){ txt=`✈️ 파리 출발 D-${dStart}`; s="soon"; }
  else if(dStart===0){ txt="🎉 오늘 출발! 즐거운 신혼여행 되세요"; s="go"; }
  else if(dEnd>=0){ txt=`🧳 여행 중 · ${-dStart+1}일차 / 14일`; s="go"; }
  else { txt="🏠 여행 종료 · 수고 많으셨어요"; s="done"; }
  el.textContent=txt; el.dataset.s=s;
}

// ---------- backup / restore ----------
document.getElementById("exportBtn").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="europe-checklist-backup.json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
});
document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const v=JSON.parse(r.result);
      state={checked:v.checked||{}, custom:v.custom||[], deleted:v.deleted||[], edits:v.edits||{}, collapsed:v.collapsed||{}, filter:v.filter||"all"};
      save(); render(); alert("복원 완료!");
    }catch(err){ alert("파일을 읽을 수 없어요. 백업 JSON 파일이 맞는지 확인해 주세요."); }
    e.target.value="";
  };
  r.readAsText(f);
});

// ---------- init ----------
function initCatSelect(){
  const sel=document.getElementById("newCat");
  CAT_LIST.forEach(c=>{ const o=document.createElement("option"); o.value=c; o.textContent=c; sel.appendChild(o); });
}
function registerSW(){
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }
}
(function(){
  initCatSelect();
  load();
  setDday();
  render();
  registerSW();
})();
</script>
